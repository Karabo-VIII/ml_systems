asset: 1000PEPEUSDT  # Binance USDM perp (1000-multiplier)
cadence: 4h
indicator_family: WMA_cross

windows:
  use_canonical: legacy
  train_start: '2023-05-06'
  unseen_end: '2026-05-22'

strategies:
- ma_type: WMA_cross
  fast: 10
  slow: 30
  filter_kind: whale_net>0
  exit_kind: opposite_cross_or_whale_flip
  augmentations: []

risk:
  starting_capital_usd: 5000.0
  max_position_pct: 1.0
  kelly_fraction: 1.0
  max_drawdown_pct: 25.0  # v8.1 SM8: n_trades_in_window=21-46 (4h TRAIN) >= 20 -> 25% applies
  max_consecutive_losses: 10
  cost_per_side_pct: 0.05  # perp taker (vs 0.10 spot) — VERIFY before live
  whale_freshness_max_hours: 28.0
  leverage: 1.0  # USER INVARIANT: no leverage above 1x even on perp
  # v8.1 SM9 MAX-HOLD GUARD (3-day sweet-spot mandate)
  # R12 perp avg hold ~1.3 days = already within 3d cap. This guard is DOCUMENTATION-ONLY;
  # does not fire in practice given current WMA(10,30) cross-exit behavior.
  max_hold_bars: 18          # 4h cadence: 3 calendar days = 3 x 24h / 4h = 18 bars
  max_hold_override_rationale: null  # no override: 1.3d avg hold is within 3d cap
  # v8.2 SM9.1 CONDITIONAL MAX-HOLD EXTENSION (PRE-REGISTERED, 2026-05-26 ~09:30 SAST)
  # R12 avg hold 1.3d: extension fires on positions still open AND winning at bar 18.
  # Prior estimate: <3% of R12 trades reach the extension gate. DOCUMENTATION guard.
  max_hold_extension_bars: 42        # 4h cadence: 7 calendar days = 7 x 24h / 4h = 42 bars (HARD CAP)
  extension_continuation_rule:
    condition_1_signal_still_active: true   # WMA(10,30): fast_ma > slow_ma still true at bar 18
    condition_2_winner_gate_pct: 0.005      # close > entry_price x 1.005 required (+0.5%)
    condition_3_no_opposite_signal: true    # no opposite WMA cross AND no whale_net flip
    losers_cut_at_3d: true                  # BINDING: losers always exit at bar 18 (3d cap)
  median_hold_winning_trades_bars: null     # DIAGNOSTIC: populate from per-trade log after run
  extension_fires_pct_estimate: 0.03        # prior estimate from avg_hold=1.3d distribution

# Funding model (perp-specific)
funding:
  source: fund_rate_mean  # chimera column; verify maps to actual 1000PEPEUSDT 8h settlement
  apply_to: held_positions  # subtract per-bar funding when long position open
  per_bar_factor: 0.5  # 4h bar = half of 8h settlement period

