# PEPE × EMA wealth bot — canonical config for AUTONOMOUS_MAXX_PEPE_BOT_2026_05_24
# Foundation: 21 all-4-positive static strategies (UNSEEN +35.2% top, +49.8% 10-seed LGBM median)

asset: PEPE
cadence: 4h
indicator_family: EMA_SMA_mix    # 21 strategies span EMA_cross + SMA_cross + SMA_state
n_seeds: 10
fwd_bars: 7                       # ~28h hold (matches static signal-flip exit median)
chimera_lag_bars: 6               # 6 * 4h = 1 calendar day

windows:
  use_canonical: legacy            # Pull TRAIN/VAL/OOS/UNSEEN boundaries from src/split_config.py SoT.
  train_start:  "2023-05-06"       # data-range start (asset-specific, supplied here)
  unseen_end:   "2026-05-22"       # data-range end (asset-specific, supplied here)

# Chimera features fed to LGBM (lagged 6 bars = 1 day; no peek)
chimera_features:
  - wh_whale_net_usd
  - rv_rv_5m
  - hbr_eta_imbalance
  - hbr_n_trades
  - bs_basis_z30
  - liq_short_z30
  - liq_long_z30
  - te_btc_imb

# 21 all-4-positive PEPE 4h strategies (action space for the LGBM signal-picker)
strategies:
  - { ma_type: EMA_cross,  fast: 7,  slow: 15, filter_kind: "whale_net>0" }
  - { ma_type: SMA_cross,  fast: 9,  slow: 21, filter_kind: "whale_net>60d_median" }
  - { ma_type: SMA_cross,  fast: 10, slow: 30, filter_kind: "whale_net>0" }
  - { ma_type: EMA_cross,  fast: 12, slow: 26, filter_kind: "whale_net>30d_median" }
  - { ma_type: SMA_cross,  fast: 5,  slow: 30, filter_kind: "whale_net>0" }
  - { ma_type: SMA_state,  fast: 30, slow: 0,  filter_kind: "whale_net>0" }
  - { ma_type: SMA_cross,  fast: 9,  slow: 21, filter_kind: "whale_net>30d_median" }
  - { ma_type: SMA_cross,  fast: 9,  slow: 21, filter_kind: "whale_net>0" }
  - { ma_type: EMA_cross,  fast: 9,  slow: 21, filter_kind: "whale_net>0" }
  - { ma_type: SMA_cross,  fast: 10, slow: 30, filter_kind: "whale_net>30d_median" }
  - { ma_type: SMA_cross,  fast: 10, slow: 30, filter_kind: "whale_net>60d_median" }
  - { ma_type: SMA_state,  fast: 30, slow: 0,  filter_kind: "whale_net>60d_median" }
  - { ma_type: SMA_cross,  fast: 5,  slow: 15, filter_kind: "whale_net>0" }
  - { ma_type: SMA_cross,  fast: 5,  slow: 30, filter_kind: "whale_net>60d_median" }
  - { ma_type: SMA_cross,  fast: 5,  slow: 30, filter_kind: "whale_net>30d_median" }
  - { ma_type: SMA_state,  fast: 50, slow: 0,  filter_kind: "whale_net>0" }
  - { ma_type: SMA_state,  fast: 30, slow: 0,  filter_kind: "whale_net>30d_median" }
  - { ma_type: SMA_cross,  fast: 7,  slow: 15, filter_kind: "whale_net>0" }
  - { ma_type: EMA_cross,  fast: 9,  slow: 21, filter_kind: "whale_net>60d_median" }
  - { ma_type: EMA_cross,  fast: 9,  slow: 21, filter_kind: "whale_net>30d_median" }
  - { ma_type: SMA_state,  fast: 50, slow: 0,  filter_kind: "whale_net>60d_median" }

model:
  n_estimators: 100
  max_depth: 3
  num_leaves: 7
  min_child_samples: 10
  learning_rate: 0.05
  reg_alpha: 0.3
  reg_lambda: 0.3
  bagging_fraction: 0.8
  feature_fraction: 0.8
  wf_train_window: 1500
  wf_step: 200
  min_signal_count_per_refit: 30

upgrades:
  u1_seed_ensemble: true
  u2_threshold_calibration: true
  u3_regime_conditional: false       # Defer to U3 round if U1+U2 insufficient
  u4_synthetic_augmentation: false   # Off by default
  u1_n_seeds: 10
  u2_threshold_grid: [-0.005, 0.0, 0.005, 0.01, 0.015, 0.02]

risk:
  starting_capital_usd: 5000.0
  max_position_pct: 1.0
  kelly_fraction: 0.25
  max_drawdown_pct: 25.0
  max_consecutive_losses: 10
  cost_per_side_pct: 0.22
  whale_freshness_max_hours: 28.0

output_dir: runs/audit/AUTONOMOUS_MAXX_PEPE_BOT_2026_05_24
