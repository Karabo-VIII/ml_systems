asset: PEPE
cadence: 4h
indicator_family: EMA_SMA_mix
n_seeds: 10
fwd_bars: 7
chimera_lag_bars: 6
windows:
  use_canonical: legacy
  train_start: '2023-05-06'
  unseen_end: '2026-05-22'
# Baseline 8 features (UNCHANGED from pepe_ema_bot_static_1strat.yaml)
# + 8 T2 features (new, full-coverage in all 4 splits) =>  16 ML features total
# T2 selection rationale:
#   - fund_rate_mean / fund_rate_z30 / fund_extreme_long_count : funding-rate family (NEW)
#   - rv_jv_5m / rv_jump_count                                 : realized-vol jump family (NEW)
#   - hbr_eta_buy                                              : buy-pressure intensity (NEW)
#   - wh_whale_buy_usd                                         : whale buy gross (complement to net) (NEW)
#   - liq_long_xsec_z                                          : cross-sectional liquidation pressure (NEW)
chimera_features:
- wh_whale_net_usd
- rv_rv_5m
- hbr_eta_imbalance
- hbr_n_trades
- bs_basis_z30
- liq_short_z30
- liq_long_z30
- te_btc_imb
- fund_rate_mean
- fund_rate_z30
- fund_extreme_long_count
- rv_jv_5m
- rv_jump_count
- hbr_eta_buy
- wh_whale_buy_usd
- liq_long_xsec_z
strategies:
- ma_type: EMA_cross
  fast: 7
  slow: 15
  filter_kind: whale_net>0
model:
  n_estimators: 100
  max_depth: 3
  num_leaves: 7
  min_child_samples: 10
  learning_rate: 0.05
  reg_alpha: 0.3
  reg_lambda: 0.3
  bagging_fraction: 0.8
  feature_fraction: 0.8
  wf_train_window: 1500
  wf_step: 200
  min_signal_count_per_refit: 30
upgrades:
  u1_seed_ensemble: true
  u2_threshold_calibration: true
  u3_regime_conditional: false
  u4_synthetic_augmentation: false
  u1_n_seeds: 10
  u2_threshold_grid:
  - -0.005
  - 0.0
  - 0.005
  - 0.01
  - 0.015
  - 0.02
risk:
  starting_capital_usd: 5000.0
  max_position_pct: 1.0
  kelly_fraction: 0.25
  max_drawdown_pct: 25.0
  max_consecutive_losses: 10
  cost_per_side_pct: 0.22
  whale_freshness_max_hours: 28.0
output_dir: runs/audit/AUTONOMOUS_MAXX_PEPE_T2_LGBM_2026_05_24/data/static_rule_1strat_T2
