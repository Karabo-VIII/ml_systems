exchange:
  name: "binance"
  enable_rate_limit: true

data:
  raw_dir: "./data/raw"
  processed_dir: "./data/processed"
  start_date: "2020-01-01 00:00:00"

# ═══════════════════════════════════════════════════════════════════
# DATA SPLIT BOUNDARIES (DATE-BASED, FROZEN)
# ═══════════════════════════════════════════════════════════════════
#
# Explicit dates prevent leakage when new data arrives and
# make_dataset.py is re-run. Ratio-based splits (50/20/20/10)
# SHIFT as data grows — future data leaks backward into training.
# These dates FREEZE the boundaries.
#
# Pipeline (fetch_all + make_dataset) always fetches all available
# data from start_date to today. The split boundaries below control
# which bars go into which segment for model training and evaluation.
#
# For paper trading: the paper_trader only operates on bars AFTER
# unseen_start. New data arriving beyond unseen_end extends the
# "live" zone. No bar before train_end is ever used for evaluation.
#
# PURGE: 400 bars between segments (per CLAUDE.md invariant)
#
splits:
  train_end:   "2023-07-01"   # 50% of Jan 2020 - Apr 2026 history
  val_end:     "2024-05-15"   # +20% for hyperparameter selection
  oos_end:     "2025-03-15"   # +20% for strategy evaluation
  unseen_start: "2025-03-15"  # Last 10%+ for backtesting + paper trading
  live_start:  "2025-09-03"   # Paper-trading init date (from paper_trader_v2 --init)
  purge_bars:  400             # Gap between segments to prevent normalization leakage

system:
  num_workers: 8
  memory_limit_gb: 32

# Target: ~5-minute bars (288 bars/day)
