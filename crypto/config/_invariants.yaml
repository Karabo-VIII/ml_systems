# CDAP Global Invariants Registry
# ================================
# Machine-checkable invariants that MUST hold across the codebase.
# Every diff is validated against this file by `src/audit/check_invariants.py`.
# A drift = halt commit (Stage-2 RED TEAM mandate).
#
# Add to this file when:
#   - A bug is fixed that originated from cross-file value drift
#   - A new cross-version constant is locked in
#   - A pipeline / strategy / training invariant is established
#
# Schema:
#   - cross_version_constants: identical literal value across all matching files
#   - cross_file_eq:           one file's expression must equal another's
#   - file_must_contain:       file must contain a literal string or regex
#   - file_must_not_contain:   file must NOT contain a string/regex
#   - dag_ordering:            run_pipeline stage ordering rules
#   - cli_flags:               CLI scripts must accept declared flags
#
# Severity:
#   critical -> halt commit (exit 2)
#   warn     -> stderr WARN (exit 1, doesn't halt)

version: 1
mandate: "DOUBLE_AUDIT_PROTOCOL.md - Contract-Driven Audit Protocol"

# Top-level archived-version exclusion: applied automatically to every
# cross_version_constants rule. Per CLAUDE.md, V2/V5/V7 are flagged
# ARCHIVED; their settings.py files contain intentional architectural
# deviations from the cross-version invariants and should not raise drift
# findings.
archived_version_globs:
  - "backups/BKP_20260429_MODEL_HARMONIZATION/v2/v*/settings.py"
  - "backups/BKP_20260429_MODEL_HARMONIZATION/v5/v*/settings.py"
  - "backups/BKP_20260429_MODEL_HARMONIZATION/v7/v*/settings.py"
  # V20 is a Capacity-tier proposal with fundamentally different architecture
  # (tick-level Performer/Hyena, seq_len=3600 vs 96, B=16 vs 32). The
  # WM_BATCH_SIZE=32 invariant doesn't apply because the memory budget
  # (B*seq_len=57,600 vs V1.x's 3,072) requires a smaller batch.
  # See docs/WM_HIGH_TIER_TARGETS_2026_04_30.md §V20 for rationale.
  - "src/wm/v20/v20_training/settings.py"

# ─────────────────────────────────────────────────────────────────────
# Cross-version constants (must be identical across all V1-V9 settings.py)
# ─────────────────────────────────────────────────────────────────────
cross_version_constants:

  - name: DIRECT_RETURN_WEIGHT
    value: 3.0
    files: ["src/wm/v*/v*_training/settings.py"]
    severity: critical
    rationale: |
      Huber dominance regularizes against TwoHot temporal memorization.
      DRW=1.0 caused ShIC decline; DRW=3.0 = stable ShIC=0.030 (Feb 2026).
      V3/V4/V6 had stale DRW=3.0 (correct) at 2026-03-17 audit; this guard
      prevents future drift.

  - name: WM_BATCH_SIZE
    value: 32
    files: ["src/wm/v*/v*_training/settings.py"]
    severity: critical
    rationale: "Larger batches accelerate memorization (confirmed batch=128 experiment)."

  - name: BIN_MIN
    value: -1.0
    files: ["src/wm/v*/v*_training/settings.py"]
    severity: critical
    rationale: "[-5,5] creates wrong bins for raw returns; [-1,1] is correct."

  - name: BIN_MAX
    value: 1.0
    files: ["src/wm/v*/v*_training/settings.py"]
    severity: critical

  - name: NUM_BINS
    value: 255
    files: ["src/wm/v*/v*_training/settings.py"]
    severity: critical
    rationale: "Schema compatibility with all checkpoints."

  - name: TWOHOT_FOCAL_GAMMA
    value: 0.0
    files: ["src/wm/v*/v*_training/settings.py"]
    severity: critical
    rationale: "Focal upweights temporally-clustered tails = memorization."

  - name: WM_STEPS_PER_EPOCH
    value: 2000
    files: ["src/wm/v*/v*_training/settings.py"]
    severity: critical
    rationale: |
      <2000 causes ShIC checks to fire before model learns (confirmed V3/V6).
      V3/V4/V6 had stale 300 from initial creation; caught by 2026-03-17 audit.

  - name: DIVERSITY_STEPS_PER_EPOCH
    value: 2000
    files: ["src/wm/v*/v*_training/settings.py"]
    severity: critical

  - name: REC_LOG_VAR_CLAMP_MIN
    value: 0.5
    files: ["src/wm/v1/v1_*_training/settings.py", "src/wm/v3/v3_training/settings.py",
            "src/wm/v4/v4_training/settings.py", "src/wm/v8/v8_training/settings.py",
            "src/wm/v9/v9_training/settings.py"]
    severity: critical
    rationale: "Pattern Q fix: reconstruction max weight reduced 1.0x -> 0.61x."

  # Added 2026-05-16 per WM_VERSION_VERDICTS — close the drift surface
  # the wm_audit_crawler is checking against `src/wm/_shared/invariants.py`.

  - name: target_prefix
    value: target_return
    files: ["src/wm/v*/v*_training/settings.py"]
    severity: critical
    rationale: |
      Voladj targets create vol shortcut (V1.0 OOS: voladj IC=0.10 but
      raw IC=0.017). Mandate raw returns everywhere.
    # NOTE: ACTIVE_HORIZONS=[1,4,16,64] is also a canonical invariant per
    # CLAUDE.md but the current cross_version_constants regex doesn't
    # handle list literals. Verified via grep at 2026-05-16: all 19
    # settings.py have `ACTIVE_HORIZONS = [1, 4, 16, 64]`. Add a
    # list-aware checker when the next list-typed invariant ships.


# ─────────────────────────────────────────────────────────────────────
# Walk-forward invariants
# ─────────────────────────────────────────────────────────────────────
walk_forward:

  - name: purge_gap_present
    pattern: "purge_gap.*=.*[0-9]+|PURGE_GAP|_PURGE_DAYS"
    files: ["src/anti_fragile.py", "src/strategy/ml/training_data_extractor.py",
            "src/analysis/walk_forward.py"]
    must_match: true
    severity: critical
    rationale: "G-AUDIT-002: purge gap = 0 caused leakage in xsec ranker."

  - name: split_four_way_used
    pattern: "split_four_way"
    files: ["src/wm/v*/v*_training/train_world_model.py"]
    must_match: true
    severity: warn
    rationale: "50/20/20/10 split with purge gaps; deviation requires explicit justification."


