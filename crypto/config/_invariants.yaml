# ─────────────────────────────────────────────────────────────────────
# Multi-asset pipeline scripts must end with print_coverage_report
# ─────────────────────────────────────────────────────────────────────
cli_coverage_report:
  required_pattern: "print_coverage_report|COVERAGE -- "
  files:
    - "src/pipeline/build_bars.py"
    - "src/pipeline/build_panels.py"
    - "src/pipeline/frontier_consolidator.py"
    - "src/pipeline/make_dataset.py"
    - "src/pipeline/features/hawkes_branching_ratio.py"
  pending_files:
    - "src/pipeline/make_dataset_legacy.py"
  severity: warn


# ─────────────────────────────────────────────────────────────────────
# Atomic-write contract for any silver/gold producer
# ─────────────────────────────────────────────────────────────────────
# Either the inline tmp+rename+verify pattern OR atomic_write_parquet()
# from src/pipeline/parquet_io.py satisfies this contract.
atomic_write:
  required_patterns:
    # Match either the framework call OR the inline-pattern triple.
    - "atomic_write_parquet|\\.tmp\\.parquet"
    - "atomic_write_parquet|rename|replace"
    - "atomic_write_parquet|read_parquet_schema|verify_cols"
  files:
    - "src/pipeline/frontier_consolidator.py"
    - "src/pipeline/make_dataset.py"
    - "src/pipeline/make_dataset_legacy.py"
    - "src/pipeline/features/hawkes_branching_ratio.py"
    - "src/pipeline/features/transfer_entropy_panel.py"
    - "src/pipeline/ingest/whale_activity.py"
    - "src/pipeline/ingest/liquidations_approx.py"
    - "src/pipeline/ingest/binance_s3_metrics.py"
    - "src/pipeline/bars/dib_bars_fast.py"
    - "src/pipeline/bars/range_bars_fast.py"
    - "src/pipeline/bars/runs_bars.py"
    - "src/pipeline/bars/adaptive_vol_bars.py"
  severity: warn
  rationale: "Atomic-tmp-rename + col-name verify; prefer framework atomic_write_parquet()."


# ─────────────────────────────────────────────────────────────────────
# Framework usage (post-2026-05-01 unification)
# ─────────────────────────────────────────────────────────────────────
# Producers that handle multiple assets / write panels SHOULD prefer the
# framework helpers in src/pipeline/{parquet_io,dispatch,cli}.py over
# inline copies. This section lists migrated stages; new stages should
# follow the same pattern. Detected by import string.
framework_usage:
  required_imports:
    parquet_io: "from parquet_io import"
    cli: "from cli import"
  recommended_for:
    - "src/pipeline/bars/*.py"
    - "src/pipeline/ingest/*.py"
    - "src/pipeline/features/hawkes_branching_ratio.py"
    - "src/pipeline/features/transfer_entropy_panel.py"
    - "src/pipeline/frontier_consolidator.py"
  severity: info
  rationale: "Single source of truth for atomic-write, dispatch, CLI surface."


# ─────────────────────────────────────────────────────────────────────
# No emoji in print statements (Windows cp1252 crash)
# ─────────────────────────────────────────────────────────────────────
windows_safety:

  - name: no_emoji_in_python_prints
    pattern_must_not_contain: "[✀-➿\U0001f300-\U0001f9ff]"
    files: ["src/**/*.py"]
    severity: warn
    rationale: "Windows cp1252 crashes on emoji in print statements."


# ─────────────────────────────────────────────────────────────────────
# Connector-integrity meta-crawler (2026-05-17). Runs the
# connector_integrity_crawler.py with 5 axes catching:
#   A1 data_source_canonical    -- trainer/strategy reads wrong-version data
#                                 (e.g., anti_fragile v50 default before today)
#   A2 cost_model_canonical     -- simulator missing calibrated cost model
#   A3 constraint_propagation   -- LO/lev only enforced at blend, not sim
#   A4 yaml_vs_v3_drift         -- yaml aggregate_metrics_* inflated vs v3
#   A5 wm_trainer_coverage      -- new trainer ships w/o CDAP invariant coverage
#
# Provenance: paper_trade_replay_v3 audit 2026-05-17 found 5 connector gaps
# that existing CDAP checkers missed (anti_fragile v50 default glob, V22-V25
# not in invariant lists, yaml inflation 7.6x on 5 blends, sim-layer LO/lev
# guards missing). User mandate: "crawlers too primitive to catch real errors".
#
# Severity mapping: A1/A2 axes block commit (critical); A3/A4/A5 warn.
connector_integrity:
  enabled: true
  crawler: "src/audit/connector_integrity_crawler.py"
  critical_axes: ["A1_DATA_SOURCE", "A2_COST_MODEL"]
  warn_axes: ["A3_CONSTRAINT_PROP", "A4_YAML_VS_V3", "A5_WM_COVERAGE"]
  timeout_seconds: 60


# ─────────────────────────────────────────────────────────────────────
# Performance anti-patterns (2026-05-16). Runs the dedicated AST-based
# crawler at src/audit/perf_anti_pattern_crawler.py and surfaces its
# findings as CDAP categories. Born from the hawkes/lob_proxy/range_bars
# hot-loop episode where 3 critical Python-loop-over-data bottlenecks
# slipped past review for months. CRITICAL findings (A1 np.empty_like+for
# / A2 iterrows-class) block commit; HIGH findings (A3 concat-in-loop)
# warn; MEDIUM/LOW are tracked in the crawler's full report at
# runs/audit/perf_anti_patterns_<DATE>.md but don't gate CDAP.
# ─────────────────────────────────────────────────────────────────────
perf_anti_patterns:
  enabled: true
  crawler: "src/audit/perf_anti_pattern_crawler.py"
  # Scope: pipeline-layer producers (where data hot-loops bite hardest).
  # Strategy + WM scans can be run on-demand via crawler CLI (--root).
  scan_root: "src/pipeline"
  # Crawler's exit codes drive CDAP severity mapping:
  #   rc=2 (any CRITICAL)  -> CDAP critical (BLOCK COMMIT)
  #   rc=1 (HIGH only)     -> CDAP warn (non-blocking)
  #   rc=0 (clean/LOW only) -> CDAP info (silent unless --verbose)
  critical_axes: ["A1_NP_EMPTY_LIKE_FOR", "A2_ITERROWS", "A2_APPLY_AXIS1",
                    "A2_APPLYMAP"]
  warn_axes: ["A3_CONCAT_IN_LOOP"]
  # Timeout: crawler is AST-only, should finish in <5s on src/pipeline (66 files)
  timeout_seconds: 30


# ─────────────────────────────────────────────────────────────────────
# G1 governance: lifecycle registry vs production_blends.yaml consistency
# Per R32 B1.4 — warns if a blend in production_blends.yaml is in SUNSET
# or ARCHIVED state in lifecycle_registry.yaml.
# ─────────────────────────────────────────────────────────────────────
lifecycle:
  enabled: true
  blends_yaml: "config/production_blends.yaml"
  registry_yaml: "config/lifecycle_registry.yaml"


# ─────────────────────────────────────────────────────────────────────
# Strat-layer invariants (added 2026-04-30 per docs/STRAT_REVIEW_SPEC §10)
# ─────────────────────────────────────────────────────────────────────
strat_layer_invariants:

  cost_model_routing:
    description: "All strategy backtests route fees through MakerCostModel, not hardcoded constants."
    audit_script: "scripts/strat_audit/cost_audit.py"
    severity: critical
    rationale: "G-AUDIT-010 caught hardcoded fees in gen3+ engines; CC-S1 enforces."

  p_fill_calibration:
    description: "All deployed strategies pass p_fill explicitly (not default 0.80; calibrated 0.30)."
    audit_script: "scripts/strat_audit/p_fill_audit.py"
    severity: high
    rationale: "Real live equity 50-75% of fixed-backtest if not calibrated (memory/simulator_bug_fix_2026_04_22.md)."

  purge_gap_400:
    description: "All walk-forward call sites use purge >= 400 bars OR inherit from AntifragileConfig."
    audit_script: "scripts/strat_audit/purge_gap_audit.py"
    severity: critical
    rationale: "G-AUDIT-002 caught purge=0 in xsec ranker; AntifragileConfig.purge_gap_bars=400 is canonical default."

  mtm_no_double_count:
    description: "All simulators have reconciliation probe or 2026-04-22 fix citation."
    audit_script: "scripts/strat_audit/mtm_regression_audit.py"
    severity: critical
    rationale: "MtM double-count fixed 2026-04-22; CDAP guard prevents regression."

  causal_standardization:
    description: "All standardization on signal-fn inputs is causal (rolling/expanding/ewm)."
    audit_script: "scripts/strat_audit/lookahead_audit.py"
    severity: high
    rationale: "G-AUDIT-011 caught full-history z-score in BOCPD; v1 heuristic noisy, v2 needed."

  panel_t1_lag:
    description: "Panel ingesters apply T+1 minimum lag from publication."
    audit_script: "scripts/strat_audit/panel_t1_lag_audit.py"
    severity: critical
    rationale: "G-AUDIT-008 caught same-day publication race in ETF overlay; 7 panels currently HIGH."

  dsr_published_ranking:
    description: "Deployment ranking sorts by DSR (n=N_universe), not raw Sharpe."
    audit_script: "scripts/strat_audit/dsr_re_rank.py"
    severity: medium
    rationale: "Multi-comparison correction across N=80+ trials; raw-Sh top-15 likely 30-50% reshuffle after DSR."

  graduation_rule_two_gate:
    description: "Strategy graduation requires DSR(n=N_total) >= 0.90 AND DSR(n=14) >= 0.95."
    audit_script: "scripts/strat_audit/dsr_re_rank.py"
    severity: high
    rationale: "Per docs/CLAUDE_PROTOCOL_2026_04_30.md §3 Challenge B; cleaner than single-gate."

  mech_coverage_5_of_8:
    description: ">=5 of 8 alpha mechanisms have >=1 ship-tier strategy with that as primary."
    audit_script: "scripts/strat_audit/mech_coverage_audit.py"
    severity: medium
    rationale: "Single-mechanism concentration = single regime-shift exposure."

  composability_max_rho_threshold:
    description: "New ship candidates: max|ρ| to deployed book <= 0.95 (else duplicate)."
    audit_script: "scripts/strat_audit/strat_pairwise_residual.py"
    severity: medium
    rationale: "WM CC1 analog at strat layer; D4 composability."


# ─────────────────────────────────────────────────────────────────────
# Flag-variant batch orchestrator (added 2026-05-02 for B007 follow-up)
# ─────────────────────────────────────────────────────────────────────
# `src/run_flag_batch.py` fires the same trainer multiple times with
# different upgrade flags (SAM/MTP/MDN/FrAug/label_noise/logit_clip),
# isolating each via --run-tag, then runs compare_v1_variants.py to
# emit a side-by-side ShIC/IC/Gap table.
#
# CRITICAL invariant: any trainer used by run_flag_batch MUST consume
# args.run_tag and embed it in ckpt_prefix. Without this, parallel
# variants clobber each other silently. The orchestrator HALTs on
# multi-variant batches when the version's capability map flags
# run_tag=False -- DO NOT SUPPRESS THIS HALT.
flag_batch_invariants:

  - name: orchestrator_present
    pattern: 'def run_variant'
    files:
      - "src/run_flag_batch.py"
    severity: critical
    rationale: |
      run_flag_batch.py is the canonical info-first orchestrator for
      flag-variant batches per /un Information-First Experimental Design.
      Removing it would force users back to manual sequential commands
      with high checkpoint-collision risk.

  - name: analyzer_present
    pattern: 'def parse_log'
    files:
      - "src/frontier_ml/v1_upgrades/compare_v1_variants.py"
    severity: critical
    rationale: |
      compare_v1_variants.py is the post-batch analyzer. Without it,
      run_flag_batch produces logs but no decision table. SHIP/MIXED/
      FLAT/REGRESS verdicts come from this script.

  - name: cohort_consumes_run_tag
    pattern: 'run_tag_str'
    files:
      - "src/wm/v1/v1_0_training/train_world_model.py"
      - "src/wm/v1/v1_1_training/train_world_model.py"
      - "src/wm/v1/v1_4_training/train_world_model.py"
      - "src/wm/v1/v1_6_training/train_world_model.py"
      - "src/wm/v3/v3_training/train_world_model.py"
      - "src/wm/v4/v4_training/train_world_model.py"
      - "src/wm/v6/v6_training/train_world_model.py"
      - "src/wm/v8/v8_training/train_world_model.py"
      - "src/wm/v11/v11_training/train_world_model.py"
      - "src/wm/v12/v12_training/train_world_model.py"
      - "src/wm/v13/v13_training/train_world_model.py"
      - "src/wm/v14/v14_training/train_world_model.py"
      - "src/wm/v22/v22_training/train_world_model.py"
      - "src/wm/v23/v23_training/train_world_model.py"
      - "src/wm/v24/v24_training/train_world_model.py"
      - "src/wm/v25/v25_training/train_world_model.py"
    severity: critical
    rationale: |
      Every base trainer in the active cohort must consume run_tag in
      ckpt_prefix (V1 standard, 2026-05-03 cohort harmonization).
      Without it, run_flag_batch multi-variant runs would clobber
      checkpoints. See docs/HARMONIZATION.md for the full standards
      table and porting recipe. Variation versions (X/E/D, snapshot,
      adapter, NCL) are tracked in HARMONIZATION.md as Phase-2
      follow-up; V20+ are stubs and exempt.

  - name: validate_world_feature_aware
    pattern: 'self\.n_features|n_features=None|run_tag_str'
    files:
      - "src/wm/v3/v3_training/validate_world.py"
      - "src/wm/v6/v6_training/validate_world.py"
      - "src/wm/v8/v8_training/validate_world.py"
    severity: high
    rationale: |
      V3/V6/V8 validate_world.py previously hardcoded
      "v{N}{revin_tag}_wm_best_ema.pt" (no feature suffix). Post the
      cohort harmonization rename (v{N}_f{features}{revin}{run_tag}_wm_*),
      validation would silently fail to find the new checkpoint. The
      validators now accept (n_features, run_tag) kwargs and build the
      full prefix; legacy names retained as fallback for pre-rename
      ckpts. Without this rule, a future regression would silently
      lose validation across V3/V6/V8 retrains.

  - name: validate_world_cli_features_flag
    pattern: '"--features"'
    files:
      - "src/wm/v3/v3_training/validate_world.py"
      - "src/wm/v6/v6_training/validate_world.py"
      - "src/wm/v8/v8_training/validate_world.py"
    severity: high
    rationale: |
      Constructor takes (n_features, run_tag) per validate_world_feature_aware,
      but the CLI must EXPOSE --features and --run-tag flags so that
      --latest / --both / --robust paths actually pass them through.
      Without this, the constructor falls back to settings.INPUT_DIM
      and silently loads wrong-feature ckpts, producing garbage
      IC/ShIC numbers (the "trust the numbers" bar). Caught by red
      team round-4 (commit 3e1df7f).

  - name: validate_world_loud_dim_check
    pattern: '_assert_dim_match|LOUD FAIL.*DIM MISMATCH'
    files:
      - "src/wm/v3/v3_training/validate_world.py"
      - "src/wm/v6/v6_training/validate_world.py"
      - "src/wm/v8/v8_training/validate_world.py"
    severity: high
    rationale: |
      Even with feature-aware ckpt path resolution, a wrong-feature
      ckpt at the legacy fallback path (or a user passing --model
      <wrong-shape-ckpt>) would silently load with strict=False and
      emit garbage IC/ShIC numbers. _assert_dim_match() reads the
      ckpt's obs_encoder weight shape and RAISES (not warns) on
      mismatch with the expected n_features. "Trust the numbers" bar:
      better to fail than ship bogus metrics.

  - name: safety_guards_module_present
    pattern: 'def safe_torch_save|def safe_metric|def preflight_numerical_probe'
    files:
      - "src/frontier_ml/v1_upgrades/safety_guards.py"
    severity: critical
    rationale: |
      Three orthogonal correctness guarantees motivated by the
      "trust the numbers" mandate (2026-05-03):

      safe_torch_save     -- atomic ckpt write (tmp + fsync + rename).
                             Power-loss/disk-full mid-write cannot
                             corrupt the target file.

      safe_metric         -- LOUD-FAIL wrapper for IC/ShIC/Sharpe/Sortino.
                             Refuses to publish NaN/inf; returns a tagged
                             MetricResult so callers can choose to log
                             "DEGENERATE" instead of silently emitting 0.0.

      preflight_numerical_probe -- 50-step dry-run BEFORE a long training
                             run. Asserts no NaN losses, grad_norm in
                             [1e-3, 1e3], ShIC computable, GPU memory
                             below ceiling. Catches fp16 overflow / dead
                             grad / dim mismatch in 60s instead of 35h.

      Module is STANDALONE; does not retrofit live code. Future trainer
      rounds + variation-version Phase 2 + post-V1 retrain cycle adopt
      via explicit import. Removing this module would silently re-open
      the partial-write / NaN-publish / 35h-doomed-run vulnerabilities.


# ─────────────────────────────────────────────────────────────────────
# Strat layer 99.99% invariants (added 2026-05-03 strat-organization)
# ─────────────────────────────────────────────────────────────────────
# Three load-bearing rules for the strategy layer's "trust the numbers"
# bar. Together with cost_model_routing + p_fill_calibration + dsr_published_ranking
# (already in strat_layer_invariants above) these enforce the discipline:
# every published Sharpe must come from a calibrated cost model + a
# DSR'd backtest, and the WM signal must be CLASSIFIED correctly per the
# CLAUDE.md Indisputable Operating Lens.
strat_99_invariants:

  - name: maker_cost_bucket_calibration_wired
    pattern: '_bucket_p_fill_and_adverse|bucket_calibration'
    files:
      - "src/strategy/maker_cost_model.py"
    severity: critical
    rationale: |
      MakerCostModel routes per-bucket p_fill / adverse_selection from
      config/maker_cost_calibration.yaml. Pre-fix (2026-05-02): single
      scalar p_fill=0.30 mispriced ~half the universe (real fills
      21-40% per bucket). Post-fix: BLUE (BTC/ETH) p_fill=0.21,
      STEADY=0.34, VOLATILE=0.32, DEGEN=0.40, all OHLC-replay calibrated.
      Removing this routing would silently regress every Sharpe number
      across the strategy registry.

  - name: dsr_print_at_sharpe_site
    description: "Any module printing Sharpe must compute DSR in the same function/scope."
    audit_script: "scripts/strat_audit/dsr_print_audit.py"
    severity: critical
    rationale: |
      CDAP `dsr_published_ranking` exists at MEDIUM. Promoting to
      CRITICAL: any line that prints "Sharpe = X.XX" without DSR(n)
      computation in the same function is a number-publication
      violation. CLAUDE.md Pattern O (Backtest Validity Gate)
      mandates DSR + selectivity + sample-size + cost-realism +
      t-stat for every backtest claim. The print-site rule closes
      the last hole.

  - name: wm_signal_filter_only_below_headline
    description: "Any strategy treating WM (V1.x) output as standalone alpha must have IC>=0.10 evidence in its registry entry."
    audit_script: "scripts/strat_audit/wm_classification_audit.py"
    severity: high
    rationale: |
      Per CLAUDE.md Indisputable Operating Lens (2026-04-30 mandate),
      V1.x is at Trader-tier (IC ~0.067 / ShIC ~0.041 record). The
      lens classifies:
        Filter   IC>0.015  -> gate-only
        Sizer    IC>0.030  -> position multiplier
        Trader   IC>0.050  -> standalone w/ quarter-Kelly  [V1.x is here]
        Headline IC>0.100  -> WM signal IS the alpha       [target]
      A strategy that treats V1.1 output as standalone-alpha (ranking
      assets by predicted return) violates the classification: V1.x
      is not yet Headline-tier. Strategies must have explicit registry
      tag of {filter|sizer|trader|headline} matching their actual WM-
      tier consumption.

  - name: lob_min_history_guard
    description: "Strategies / models consuming lob_* features must enforce min 6mo history before training/deployment."
    audit_script: "scripts/strat_audit/lob_history_audit.py"
    severity: high
    rationale: |
      LOB collector started 2026-04-01; ~30 days of live coverage as
      of 2026-05-03 (1.3% of chimera history; 0.01-0.04% of bars).
      Backfill via binance_vision_book_depth_profile.py (2026-05-03
      shipped) brings 3+ years of depth-profile data, but until that
      lands and validates, any strategy consuming lob_* features will
      overfit to a single regime-month.
      Rule: every strategy / model whose FEATURE_LIST includes lob_*
      MUST have a min_history_days parameter and refuse to train/deploy
      below 180 days of LOB coverage on the asset.

  - name: wm_ensemble_feature_aware_tmpls
    pattern: 'ckpt_tmpl.*f\{feat\}'
    files:
      - "src/strategy/wm_ensemble.py"
    severity: high
    rationale: |
      wm_ensemble.py registers per-version ckpt loading templates for
      strategy-layer consumption. Post-2026-05-03 cohort harmonization,
      every active version's primary template includes f{feat} so
      different feature-count training rounds don't shadow each other
      at inference. V3/V4/V6/V8 retain a legacy fallback for pre-rename
      ckpts; V11-V14 enforce f{feat} unconditionally (they always wrote
      that pattern).

  - name: refresh_active_run_detection
    pattern: 'def detect_active_run|HALT: another refresh is currently running'
    files:
      - "src/pipeline/refresh.py"
    severity: high
    rationale: |
      refresh.py must check _dag_state_live.json on startup and HALT
      if another refresh's heartbeat is fresh (< 120s old). Without
      this guard, two parallel `refresh.py --target X` invocations
      would race on the same outputs, last-write-wins, possibly
      corrupting partial parquet files. Override paths: --attach
      (read-only watch), --wait-active (block), --ignore-active
      (race; only when targets disjoint). 2026-05-03 weakness fix.

  - name: docs_present
    pattern: 'Flag-Variant Batch Runner'
    files:
      - "docs/RUN_FLAG_BATCH.md"
    severity: warn
    rationale: |
      Discoverability: capability map + decision rules + when-to-use-
      which-orchestrator table live in docs/RUN_FLAG_BATCH.md. New
      contributors need this to avoid clobbering checkpoints or
      silently running no-op variants.

  # ───────────────────────────────────────────────────────────────────
  # Production blends — Round-16 (2026-05-09) wiring guards.
  # Provenance: docs/DEPLOY_WIRING_AUDIT_2026_05_09.md uncovered that
  # CONSERVATIVE/PRIME/AGGRESSIVE blends existed only as a Python dict
  # in an offline backtest script. These rules enforce that the yaml
  # source-of-truth + composer remain present.
  # ───────────────────────────────────────────────────────────────────
  - name: production_blends_yaml_present
    pattern: 'production_blends_2026_05_09:'
    files:
      - "config/production_blends.yaml"
    severity: critical
    rationale: |
      The CONSERVATIVE/PRIME/AGGRESSIVE blend definitions are the source
      of truth for live deploy. Without this yaml, BlendComposer and
      run_blend.py both abort. Removing this file = removing the live
      deploy path.

  - name: blend_composer_present
    pattern: 'class BlendDefinition|def load_blend|KNOWN_RUNNERS'
    files:
      - "src/strategy/gen5_growth/blend_composer.py"
    severity: critical
    rationale: |
      BlendComposer is the bridge between yaml definition and live runner.
      It validates: weight sum = 1.0, runner kind in KNOWN_RUNNERS, every
      non-cash sleeve has seed + ranker. If this module disappears,
      run_blend.py is non-functional.

  - name: pillar_p1_p5_cut_to_zero
    pattern: '"P1": False'
    files:
      - "src/strategy/gen5_growth/orchestrator.py"
    severity: critical
    rationale: |
      Per PROD_DEPLOY_VERDICT_2026_05_09 G2: P1 listing-frontrun is NEGATIVE
      NET (-1.38%/event) on real-data replay. P5 same (-2.13%/event).
      Both are flagged DISABLED in DEFAULT_PILLAR_FLAGS. If anyone re-enables
      P1, 10% of equity routes to the demonstrated negative-net pillar.
      Any change must update PROD_DEPLOY_VERDICT first.

  - name: pillar_p5_cut_to_zero
    pattern: '"P5": False'
    files:
      - "src/strategy/gen5_growth/orchestrator.py"
    severity: critical
    rationale: |
      Twin of pillar_p1_p5_cut_to_zero — P5 must stay disabled until a
      fresh real-data audit shows positive net.

  - name: master_alloc_p1_p5_zero
    pattern: 'P1_listing_frontrun: 0\.0'
    files:
      - "config/wealth_axis_master_allocation.yaml"
    severity: critical
    rationale: |
      master allocation must reflect the orchestrator-level cut.
      P1=0% in yaml + P1=False in orchestrator = belt and suspenders.

  - name: xsec_orchestrator_default_ranker_explicit
    pattern: "DEFAULT_RANKER = MODELS / 'xsec_ranker' / 'xgb_ndcg_v1_u87.pkl'"
    files:
      - "src/strategy/gen5_growth/xsec_orchestrator.py"
    severity: warn
    rationale: |
      Pre-2026-05-09, XsecOrchestrator default was xgb_ndcg_v1.pkl (legacy,
      non-u87). Live path overrode correctly via WEALTH_AXIS_PHASE6 sleeves
      but the smoke test silently loaded the wrong ranker. Default must
      now be u87.

  # 2026-05-09 round-17 strat-layer upgrade rules
  - name: intent_aggregation_present
    pattern: 'def aggregate_intents'
    files:
      - "src/strategy/gen5_growth/intent_aggregation.py"
    severity: critical
    rationale: |
      Solves the magnitude-capture-rate ~0.067x bug (per PAPER_TRADE_3BLEND
      report 2026-05-09: DEXE +15.74% gross appearing 7x in ledger as
      separate small wins). aggregate_intents() dedupes same-asset picks,
      caps per-asset NAV, applies consensus boost on 3+ sleeve agreement.
      Removing this module reverts to magnitude-collapse behavior.

  - name: regime_selector_in_run_blend
    pattern: 'def select_blend_for_regime'
    files:
      - "src/strategy/gen5_growth/scripts/run_blend.py"
    severity: critical
    rationale: |
      Without regime gating, all 3 long-biased blends
      (CONSERVATIVE/PRIME/AGGRESSIVE) lose simultaneously when BTC 30d <
      -5% (per 2026-04-18 -> 24 paper-trade window where all 6 runs lost).
      select_blend_for_regime() routes to CASH_DEFENSIVE in bear and
      CONSERVATIVE_NEUTRAL in sideways. Operator can disable via
      regime_selector.enabled = false in production_blends.yaml.

  - name: defensive_blends_present
    pattern: 'CASH_DEFENSIVE:'
    files:
      - "config/production_blends.yaml"
    severity: critical
    rationale: |
      CASH_DEFENSIVE and CONSERVATIVE_NEUTRAL blends are the regime-aware
      fallback for bear/sideways. They are auto-selected; without them
      the regime selector silently falls through to the long-biased
      default. Removing them defeats Gap 4 of the upgraded-lens review.

  - name: take_profit_field_in_xsec
    pattern: 'take_profit'
    files:
      - "src/strategy/gen5_growth/xsec_orchestrator.py"
    severity: warn
    rationale: |
      Asymmetric R:R fix: take_profit defaults to 0.10, stop_loss to 0.05
      (3:1 reward:risk vs prior 1:1 with no profit-take). Without this
      field, EV per trade was -1.0% at 36% hit rate (per PAPER_TRADE_3BLEND
      analysis). Removing the field reverts the asymmetry — regression.

  - name: oracle_honest_scorer_exists
    pattern: 'def validate'
    files:
      - "src/oracle/honest_scorer.py"
    severity: critical
    rationale: |
      2026-05-21 Oracle Layer Charter: every oracle predictions parquet must
      pass honest_scorer.validate() (8 gates incl. ShIC, DSR, v3-truth-Sharpe,
      canonical splits) before consumption by the strat layer.
      Removing this module breaks the validation contract documented in
      docs/ORACLE_LAYER_CHARTER_2026_05_21.md and reverts to the class of
      bugs that produced offline +91% vs v3 +3% silent inflation
      (PER_ASSET_MA_EMA_UNION_2026_05_20).

  - name: oracle_v3_truth_scorer_exists
    pattern: 'def score_candidate'
    files:
      - "src/oracle/v3_truth_scorer.py"
    severity: critical
    rationale: |
      2026-05-21 Oracle Layer Charter: cell-selection metric MUST be the
      deploy metric. v3_truth_scorer.score_candidate() applies cost drag,
      ShIC and DSR adjustment at SELECTION time -- not after deploy.
      Removing this module reverts to the structural lie where candidates
      are selected by `sharpe_train_point` (inflated 60-100pp vs v3 truth).

  - name: oracle_split_config_imported_in_train_scripts
    pattern: 'from split_config import'
    files:
      - "scripts/oracle/build_oracle_ma_ml.py"
      - "scripts/oracle/predict_movers_from_behavior.py"
      - "scripts/oracle/train_per_sleeve_setup_classifier.py"
      - "scripts/oracle/train_win_capture_v2_xrel.py"
    severity: critical
    rationale: |
      2026-05-21 split-fragmentation fix: these scripts previously hardcoded
      TRAIN/VAL/OOS dates that conflicted with canonical src/split_config.py.
      Result was in-sample contamination for canonical-VAL backtest windows
      (Auditor finding #1: 137/304 v3-VAL days in-sample for ORACLE_MA_ML).
      Each script MUST import canonical split boundaries.

# ─────────────────────────────────────────────────────────────────────
# Pipeline A+ closure invariants (2026-05-22, oracle data-layer closure)
# ─────────────────────────────────────────────────────────────────────
# These three invariants close the gaps that produced 3 registry-related
# bugs in 14 days (label leak 78dbdd7, z-score wall break c59c4e7, schema
# clash 7fa8bbd). They lift the feature-engineering sub-layer from B- to A+.

pipeline_a_plus_closure:

  - name: feature_registry_has_schema_version
    pattern: 'schema_version:'
    files:
      - "config/feature_registry.yaml"
    severity: critical
    rationale: |
      Registry edits without a versioned schema have produced 3 silent
      breakage bugs in the last 14 days. schema_version is monotonic
      and MUST be bumped on any features/, prefix:, path:, layout:, or
      sources_to_join change. The contract test in
      src/pipeline/registry_contract_test.py reads this field; missing
      schema_version means the contract test can't gate registry edits.

  - name: validate_chimera_has_lookahead_mutual_info
    pattern: 'def check_lookahead_mutual_info'
    files:
      - "src/pipeline/validate_chimera.py"
    severity: critical
    rationale: |
      Pearson correlation (check_lookahead_correlation) catches DIRECT
      linear leaks like btc_ret_same_day at |corr|=0.348. Subtle
      non-linear leaks (feature = |future_return|, feature =
      forward-rolling vol) have low Pearson but high mutual information.
      check_lookahead_mutual_info is the MI-based detector that closes
      this gap. Removing it reverts to a class of silent leaks Pearson
      cannot catch.

  - name: registry_contract_test_module_exists
    pattern: 'def main'
    files:
      - "src/pipeline/registry_contract_test.py"
    severity: critical
    rationale: |
      registry_contract_test.py is the deterministic gate that runs 7
      checks against feature_registry.yaml (schema_version present,
      orphan sources_to_join, reserved-name guard, prefix uniqueness,
      layout/date validity, glob match, wide_pattern capture). Wired
      into pre_train_gate.py as the cheap registry-edit guard.
      Removing this module disables the gate.

# ─────────────────────────────────────────────────────────────────────
# Pipeline progress convention invariants (2026-05-22, oracle homogeneous-CLI closure)
# ─────────────────────────────────────────────────────────────────────
pipeline_progress_convention:

  - name: progress_module_exists
    pattern: 'def phase_log'
    files:
      - "src/pipeline/progress.py"
    severity: critical
    rationale: |
      Single source of truth for producer progress emission. Defines
      VALID_PHASES + ProgressTask + stage_run. Removing this disables
      the homogeneous-interface convention shipped 2026-05-22. All
      producers progressively migrate to import from this module.

  - name: refresh_streams_subprocess_stdout
    pattern: 'subprocess.PIPE'
    files:
      - "src/pipeline/refresh.py"
    severity: critical
    rationale: |
      refresh.py must stream subprocess stdout to the user's terminal
      via PIPE + reader thread (not directly to log file via stdout=logf).
      Reverting to direct file piping hides producer progress from the
      user — the gap this session closed. See docs/PIPELINE_PROGRESS_CONVENTION_2026_05_22.md.

# ─────────────────────────────────────────────────────────────────────
# Pipeline universality + leak-detector invariants (2026-05-22, oracle A+ closure)
# ─────────────────────────────────────────────────────────────────────
pipeline_universality:

  - name: validate_chimera_has_normalization_leakage_check
    pattern: 'def check_normalization_leakage'
    files:
      - "src/pipeline/validate_chimera.py"
    severity: critical
    rationale: |
      Catches cross-fold normalization leakage: features z-scored using
      full-history statistics drift in mean between train and test halves.
      Added 2026-05-22 oracle pipeline A+ closure. Advisory WARN per
      column; legitimate regime drift can hit 0.5-1.0σ; threshold 1.5σ.

  - name: validate_chimera_has_same_day_pub_race_check
    pattern: 'def check_same_day_publication_race'
    files:
      - "src/pipeline/validate_chimera.py"
    severity: critical
    rationale: |
      Catches features whose non-null date range extends beyond the target's,
      which necessarily indicates forward-shifted (look-ahead) data. Closes
      the "feature created at close[t+ε] for return[t→t+1]" leak class that
      Pearson + MI leak detectors may not catch if the leak shows up as
      a date-range mismatch rather than a correlation spike.

  - name: producer_uses_pipeline_progress
    pattern: '_pl\(|phase_log\(|ProgressTask\('
    files:
      - "src/pipeline/bars/*.py"
      - "src/pipeline/ingest/*.py"
      - "src/pipeline/features/*.py"
      - "src/pipeline/add_xrel_features.py"
      - "src/pipeline/frontier_consolidator.py"
      - "src/pipeline/make_dataset.py"
      - "src/pipeline/make_dataset_legacy.py"
      - "src/pipeline/features/basis_signals.py"
      - "src/pipeline/features/hawkes_branching_ratio.py"
      - "src/pipeline/fetch_all.py"
    severity: warn
    rationale: |
      Every refresh-invoked producer should use pipeline.progress for
      homogeneous progress emission per the convention shipped 2026-05-22.
      Per auditor sweep ad217ce9239ceb16b TOP-5 ladder + long-tail
      sweep: 23/25 producers now compliant; remaining 2 are orchestrator
      (refresh.py) + gate-report (pre_train_gate.py) which are
      intentionally banner-styled. WARN-only because dropping the
      convention from a producer doesn't break correctness — it just
      makes the user-facing stream inconsistent.


# ─────────────────────────────────────────────────────────────────────
# Trader deploy gates (added 2026-05-28 with trader-skill upgrade)
# ─────────────────────────────────────────────────────────────────────
# Closes the 16-item PRE_DEPLOY_CHECKLIST (`.claude/skills/trader/PRE_DEPLOY_CHECKLIST.md`)
# + Lifecycle + Risk + Execution + Sizing playbook items.
#
# Pattern-matchable rules live here. Rules requiring file-existence /
# JSON-shape / multi-file-correlation checks live in
# `src/audit/check_deploy_gates.py` (stub, expands on demand).
#
# A "deploy commit" is detected by either:
#   - file path matches `runs/deploy/*/deploy_claim.json`, or
#   - a `config/sleeves/*.yaml` `stage:` field changes to a live_* value.
# Deploy commits run the full trader-gate validation. Non-deploy commits
# still run the static pattern checks below.
trader_deploy_gates:

  # Item 1 — cost source is canonical
  # Sleeves under scripts/wealth_bot/ must NOT redefine fee/slippage/funding constants;
  # they must import from src/strategy/cost_model.py.
  - name: trader_cost_source_canonical
    pattern_must_not_contain: 'fee_bps\s*=\s*[0-9]|slippage_bps\s*=\s*[0-9]|round_trip_cost\s*=\s*0\.00'
    files: ["scripts/wealth_bot/**/*.py"]
    severity: warn
    rationale: |
      Sleeves must source costs from src/strategy/cost_model.py (SPOT_COST /
      PERP_COST). Local redefinition escapes cost-model recalibration
      (G-AUDIT-010). PRE_DEPLOY_CHECKLIST item 1.

  # Item 2 — MtM reconciliation probe must exist
  - name: trader_mtm_reconciliation_probe
    files: ["scripts/probe_simulator_fix.py"]
    must_exist: true
    severity: critical
    rationale: |
      Every new simulator MUST include a reconciliation gate (sum(pnl_stream)
      ≈ sum(trade_log.pnl) within 0.1%). Pre-2026-04-22 MtM double-count
      caused 5-7x equity inflation. PRE_DEPLOY_CHECKLIST item 2. Already
      enforced by simulator:reconciliation_probe_present above; restated
      here under the trader_deploy_gates section for completeness.

  # Item 3 — no look-ahead in K-selection
  # Trade selection/filter logic must not RANK / SORT / FILTER by target_return
  # or future_return columns. Schema checks (`if "target_return" in df.columns`)
  # are legitimate and are NOT matched.
  - name: trader_no_lookahead_in_selection
    pattern_must_not_contain: 'sort_values\([^)]*target_return|sort_values\([^)]*forward_return|argsort.*target_return|argmax.*target_return|nlargest\([^)]*target_return|nsmallest\([^)]*target_return|top.*target_return|\[df\[.target_return|\[.*target_return.*\]\s*>'
    files: ["scripts/wealth_bot/**/*.py", "src/strategy/**/*.py"]
    severity: critical
    rationale: |
      K-selection or trade filtering must never RANK or FILTER by
      target/future-return columns. Schema checks (`if "target_return_1" in
      df.columns`) are NOT matched — only ranking/sorting/filtering operations.
      PRE_DEPLOY_CHECKLIST item 3. Provenance: 2026-05-25 R51 E51_1 + R54 A54_2
      gap-window incidents.

  # Item 4 — stride-1 predictions
  # WM-prediction-emitting scripts must use stride=1 (post-Pattern-N fix 2026-04-14).
  - name: trader_stride_1_predictions
    pattern: 'stride\s*=\s*1|--stride\s+1'
    files: ["src/wm/gen_preds.py", "src/strategy/generate_wm_predictions.py"]
    must_match: true
    severity: critical
    rationale: |
      Pattern N (2026-04-14): pre-stride-1-fix predictions were stale up to
      95 bars; all pre-fix backtests untrusted. PRE_DEPLOY_CHECKLIST item 4.

  # Item 6 — claim contract v1.2 import
  # Any script emitting a SHIP-tier audit JSON must use build_ship_claim_block.
  - name: trader_claim_contract_v12_import
    pattern: 'from\s+wealth_bot\.framework\.claim_contract\s+import|from\s+src\.wealth_bot\.framework\.claim_contract\s+import'
    files: ["scripts/wealth_bot/**/ship*.py", "scripts/wealth_bot/**/promote*.py", "scripts/wealth_bot/**/deploy*.py"]
    must_match: true
    severity: warn
    rationale: |
      Deploy scripts must build claim via build_ship_claim_block (claim_contract v1.2)
      so check_wealth_bot_claims.py can validate. PRE_DEPLOY_CHECKLIST item 6.
      Pattern-match is heuristic (not all deploy scripts named ship*/promote*/deploy*);
      check_deploy_gates.py handles the full check.

  # Item 11 — DSR + CSCV multi-test imports for sweep-derived strategies
  - name: trader_dsr_cscv_used_in_walkforward
    pattern: 'deflated_sharpe|cscv_pbo|DSR_p_value'
    files: ["src/analysis/strategy_walkforward.py", "src/analysis/strategy_universe_eval.py"]
    must_match: true
    severity: warn
    rationale: |
      Sweeps > 20 configs require DSR > 0.95 AND CSCV PBO < 0.50 at promotion.
      Walk-forward harness must compute both. PRE_DEPLOY_CHECKLIST item 11.

  # Item 14 — decay monitor referenced by RiskController
  - name: trader_risk_controller_has_decay_monitor
    pattern: 'decay_monitor|DecayMonitor|halt_IC_halflife|halt_consecutive_DD'
    files: ["src/strategy/risk_controller.py"]
    must_match: true
    severity: warn
    rationale: |
      RiskController.size_trade() must integrate decay monitor (per CLAUDE.md
      and trader-skill RISK_PLAYBOOK). PRE_DEPLOY_CHECKLIST item 14.


# ─────────────────────────────────────────────────────────────────────
# Trader risk/sizing invariants (RISK_PLAYBOOK + SIZING_THEORY)
# ─────────────────────────────────────────────────────────────────────
trader_risk_sizing:

  # Long-only + spot + lev=1 hard North Star bounds.
  # Sleeve YAMLs must not declare leverage > 1 or short positions in LIVE stages.
  - name: trader_long_only_north_star
    pattern_must_not_contain: 'leverage\s*:\s*[2-9]|leverage\s*:\s*1\.\d+|allow_short\s*:\s*true|position_range_min\s*:\s*-'
    files: ["config/sleeves/**/*.yaml"]
    severity: critical
    rationale: |
      PROJECT_NORTH_STAR §3.1: LONG-ONLY + SPOT + LEV=1. Any sleeve YAML
      enabling shorts or leverage > 1 = automatic reject. SIZING_THEORY +
      CRYPTO_MICROSTRUCTURE hard cap.

  - name: trader_max_kelly_fraction_le_half
    pattern_must_not_contain: 'max_kelly_fraction\s*:\s*0\.[6-9]|max_kelly_fraction\s*:\s*1\.|max_kelly_fraction\s*:\s*[1-9]'
    files: ["config/sleeves/**/*.yaml"]
    severity: critical
    rationale: |
      No full-Kelly under any condition. Maximum is 1/2-Kelly per
      SIZING_THEORY.md hard caps. Default is 1/8-Kelly for new sleeves.

  - name: trader_spot_mode_default
    pattern_must_not_contain: 'mode\s*:\s*perp|mode\s*:\s*PERP|perp_enabled\s*:\s*true'
    files: ["config/sleeves/**/*.yaml"]
    severity: critical
    rationale: |
      PERP deferred per docs/futures_strategy_considerations.md (0/1304 configs
      profitable after funding). SPOT-only mandate.

  # No trail-stops on H6-class entries (H23 refutation)
  - name: trader_no_trail_stop_on_h6_class
    pattern_must_not_contain: 'trail_stop\s*:\s*true|trailing_stop\s*:\s*true'
    files: ["config/sleeves/**/h6*.yaml", "config/sleeves/**/H6*.yaml", "config/sleeves/**/catalyst*.yaml"]
    severity: warn
    rationale: |
      H23 trail-stop on H6 entries: -35.5%, REFUTED 2026-05-27 commit 5c108c4.
      Catalyst-class plays have no downside protection beyond max-hold. Until a
      working mechanism is found, do not deploy trail-stops on H6-class.

  # Fat-tail asset cap: PEPE-class sleeves must cap kelly fraction at 1/16
  - name: trader_fat_tail_assets_capped
    pattern_must_not_contain: 'max_kelly_fraction\s*:\s*0\.[1-9]'
    files: ["config/sleeves/**/pepe*.yaml", "config/sleeves/**/PEPE*.yaml", "config/sleeves/**/memecoin*.yaml"]
    severity: warn
    rationale: |
      PEPE-class memecoins are fat-tailed; Kelly's σ² assumption fails.
      Cap max_kelly_fraction at 0.0625 (1/16-Kelly) per SIZING_THEORY anti-Kelly
      rule. Conservative against PEPE × MA/EMA gold-standard dossier findings.

  # RiskController kill switches must be present in code
  - name: trader_risk_controller_has_kill_switches
    pattern: 'kill_switch|should_halt|portfolio_dd_halt|api_error_rate_halt|data_feed_gap_halt'
    files: ["src/wealth_bot/bot/risk_manager.py"]
    must_match: true
    severity: warn
    rationale: |
      RISK_PLAYBOOK §Kill switches: 6 automatic halts (portfolio DD > 20%,
      single-trade loss > 5%, cross-sleeve corr > 0.9, API error > 5%/1h,
      data feed gap > 5min, mechanism falsifier turns FALSE). Retargeted
      2026-06-06 (harmonise) from the never-rebuilt src/strategy/risk_controller.py
      to the LIVE kill-switch home src/wealth_bot/bot/risk_manager.py (has
      kill_switch + should_halt logic) -- so the safety rule ENFORCES against real
      code instead of vacuously not-enforcing on a ghost path. WARN-severity: full
      6-halt coverage is to be re-verified when the trader sleeve goes live.


# ─────────────────────────────────────────────────────────────────────
# Trader lifecycle invariants (LIFECYCLE.md)
# ─────────────────────────────────────────────────────────────────────
# These rules require directory-correlation checks not expressible in pure
# regex schema; implementation lives in src/audit/check_deploy_gates.py
# (see file_contains_or_dir_check rule type below).
trader_lifecycle:

  # Every sleeve directory must declare a lifecycle.yaml.
  # Stub: pattern-checked here on any existing lifecycle.yaml; full
  # directory-completeness check in check_deploy_gates.py.
  - name: trader_lifecycle_yaml_has_required_fields
    pattern: 'current_stage\s*:|stage_entered_at_utc\s*:|min_time_in_stage_days\s*:'
    files: ["config/sleeves/**/lifecycle.yaml"]
    must_match: true
    severity: warn
    rationale: |
      Every sleeve's lifecycle.yaml must declare current_stage,
      stage_entered_at_utc, and min_time_in_stage_days. LIFECYCLE.md §
      "Lifecycle YAML (one per sleeve)".

  - name: trader_lifecycle_stage_values_valid
    pattern_must_not_contain: 'current_stage\s*:\s*(?!incubation|paper|live_small|live_scale|retired)'
    files: ["config/sleeves/**/lifecycle.yaml"]
    severity: warn
    rationale: |
      Stage must be one of: incubation | paper | live_small | live_scale | retired.
      LIFECYCLE.md stage diagram.


# ─────────────────────────────────────────────────────────────────────
# Bitemporal / as-of (knowable-at) look-ahead defense (added 2026-06-06)
# ─────────────────────────────────────────────────────────────────────
# STRUCTURAL look-ahead defense for lag-prone vendor sources (ETF flows,
# Wikipedia/attention, funding, on-chain). The project catches look-ahead
# REACTIVELY today (ad-hoc shift(1) + validate_chimera correlation / MI /
# same-day-publication-race detectors). The bitemporal layer records WHEN
# each datum became KNOWABLE so a feature can't attach to a bar that closed
# before it existed:
#
#       knowable_at = event_time + publication_lag ;  attach iff knowable_at <= base_time
#
# The contract: a lag-prone source must either go through the as-of join
# (src/pipeline/asof_join.py) OR declare a publication lag
# (config/feature_publication_lag.yaml) -- so a feature can't be used without
# a knowable-at contract. Severity is WARN (advisory) to start: these are
# `pattern` + must_match rules over the apparatus files only, checked by
# check_pattern_must_contain (which WARNs -- never escalates to critical -- if
# a target file is missing, so a path move can't block every commit and the
# rule can't false-positive across the whole repo).
bitemporal_asof:

  - name: asof_join_module_present
    pattern: 'def asof_join_knowable'
    files:
      - "src/pipeline/asof_join.py"
    severity: warn
    rationale: |
      asof_join.py is the structural look-ahead defense: a pure, deterministic
      backward as-of join on the KNOWABLE-AT timestamp (event_time + publication
      lag). Removing it reverts lag-prone sources to ad-hoc shift(1) + the
      reactive validate_chimera detectors only -- which fire AFTER a vendor
      revision / backfill / same-day-publication race has already leaked into
      chimera.

  - name: asof_join_enforces_knowable_at_contract
    # The join must (a) gate on knowable_at = feature_time + publication_lag and
    # (b) reject negative lag (which would re-open look-ahead). This pattern
    # proves the leak-free invariant is still wired, not just the function name.
    pattern: 'publication_lag_ms\s*<\s*0|knowable_at\s*=\s*feature_time|feature_time \+ publication_lag'
    files:
      - "src/pipeline/asof_join.py"
    severity: warn
    rationale: |
      Guards the two load-bearing invariants of the knowable-at contract:
      attach iff (feature_time + publication_lag) <= base_time, AND a negative
      publication_lag is rejected (a negative lag lets a value attach BEFORE its
      event time = look-ahead). If a refactor drops the negative-lag guard or
      the knowable-at arithmetic, this surfaces it.

  - name: publication_lag_registry_present
    # The lag-prone families the design flagged MUST carry a declared lag so a
    # producer can route them through the as-of join instead of attaching them
    # raw. Match all four seeded families in one pattern (any present satisfies;
    # the YAML's own structure is validated at load by load_publication_lags()).
    pattern: 'etf_flows:|wikipedia:|funding:|onchain:'
    files:
      - "config/feature_publication_lag.yaml"
    severity: warn
    rationale: |
      config/feature_publication_lag.yaml is the declared-lag registry
      (family -> lag_ms). asof_join.load_publication_lags() reads it; a producer
      joining a lag-prone source looks up its family's lag here. The seeded
      lag-prone families (etf_flows ~1d, wikipedia/attention ~1d next-bar,
      funding ~8h, onchain conservative ~1d) are the same same-day-publication /
      vendor-revision class validate_chimera flags reactively. Missing registry
      = no knowable-at contract for these sources. WARN (advisory) at introduction.

# ─────────────────────────────────────────────────────────────────────
# Agent-layer taxonomy (the 3-class F/A1/A2 separation, machine-enforced).
# Provenance: docs/AGENT_LAYER_ARCHITECTURE_2026_06_11.md SS1.8 (Phase 0).
# These 4 invariants make the F->A1 boundary unbreakable. Each is TWO-SIDED:
# it REJECTS a violation AND ACCEPTS valid code. Empty-glob guards: a rule whose
# file glob matches NOTHING surfaces a WARN (never silently passes).
# ─────────────────────────────────────────────────────────────────────
agent_taxonomy:

  # (a) The forecaster is FROZEN inside any agent: no F.train(), no F-params in
  # an optimizer. The .detach() guarantee is structural in forecast_bundle.
  # from_forecaster (which detaches every tensor); here we forbid the two
  # un-freezing operations on the agent side.
  forecaster_frozen_in_agents:
    agent_globs:
      - "src/agents/**/*.py"
    # Lines matching these (outside comments) = a forecaster being un-frozen.
    forbidden_patterns:
      - '\b(?:wm|forecaster|world_model|self\.wm)\.train\(\s*\)'      # F.train() un-freeze
      - '(?:optim\.\w+|Optimizer|Adam\w*|SGD)\s*\([^)]*\b(?:wm|forecaster|world_model)\.parameters\(\)'  # F-params in optimizer
    severity: critical
    rationale: |
      An A1/A2/A1H plans over a FROZEN forecaster. Calling F.train() or putting
      F.parameters() into an optimizer trains the forecaster from the agent's
      objective -> GIGO + IC-as-objective through the back door. The bundle's
      tensors are detached at the source (forecast_bundle.from_forecaster); this
      rule guards the agent side. Two-sided: a frozen agent (for p in wm: p.requires_grad=False)
      does NOT match; an un-freeze DOES.

  # (b) The critic/reward NEVER regresses to a decoded return_logits (F's
  # prediction). It must trace to a REALIZED target_return_*. The GIGO firewall.
  no_predicted_return_as_realized_reward:
    agent_globs:
      - "src/agents/**/*.py"
    # A reward/critic-target line that references the decoded F prediction.
    forbidden_patterns:
      - '(?:reward|critic_target|value_target|reward_target)\b[^=\n]*=[^=\n]*\b(?:return_logits|decoded_return|pred_return|predicted_return)\b'
    # Files whose basename starts with one of these may use predicted returns
    # (the explicitly-flagged imagination/DREAM modes), provided they assert
    # genuine_learning.passed -- exempt from this rule.
    dream_exempt_prefixes:
      - "dream"
    severity: critical
    rationale: |
      Rewarding on F's PREDICTED return teaches the agent to trade the WM's
      hallucination (the GIGO trap). The realized reward must be a target_return_*
      (REPLAY mode). Predicted-return reward is allowed ONLY in an explicit dream_*
      module gated on genuine_learning.passed. Two-sided: reward = action * target_return_1
      does NOT match; reward = decode(return_logits) DOES (outside dream_*).

  # (c) Every agent-LOGIC module declares __class_tag__ in {A1, A2, A1H}. Stops
  # the V16/V17 mis-file class (an untagged acting module) from recurring.
  agent_class_declared:
    # The agent-logic entry points (NOT utilities/backbones/configs). Each MUST
    # declare a module-level __class_tag__ in VALID_CLASSES.
    agent_logic_globs:
      - "src/agents/a1_wm_consuming/dreamer_v3_agent.py"
      - "src/agents/a1_wm_consuming/environment.py"
      - "src/agents/a1_wm_consuming/policy.py"
      - "src/agents/a1_wm_consuming/ppo.py"
      - "src/agents/a1_wm_consuming/sac_agent.py"
      - "src/agents/a1_wm_consuming/train_agent.py"
      - "src/agents/a2_raw_data/*_agent.py"
      - "src/agents/a1h_hybrid/*_agent.py"
    valid_classes: ["A1", "A2", "A1H"]
    severity: critical
    rationale: |
      An acting module without a class tag is undeclared (the V16/V17 mis-file
      pattern). The tag is the machine-readable class. Two-sided: a module with
      __class_tag__ = "A1" PASSES; one missing the tag, or with an invalid value,
      FAILS. (Utilities/backbones/configs are intentionally NOT in scope.)

  # (d) V16/V17 are A1 backbones, not forecasters: src/wm/v16 and src/wm/v17
  # must contain ONLY the MOVED.md tombstone, never model code.
  v16_v17_not_in_wm:
    tombstone_dirs:
      - "src/wm/v16"
      - "src/wm/v17"
    # Any .py under these dirs = model code resurfacing in the forecaster zoo.
    forbidden_extension: ".py"
    severity: critical
    rationale: |
      V16 (DreamerV3) and V17 (TD-MPC2) are A1 backbones, reclassified to
      src/agents/a1_wm_consuming/backbones/. The src/wm/v16 + src/wm/v17 dirs
      keep only a MOVED.md tombstone. A .py reappearing there = the reclassification
      regressed. Two-sided: a dir with only MOVED.md PASSES; any .py FAILS.
