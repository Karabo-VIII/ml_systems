    severity: critical
    rationale: "CLAUDE.md must cite the directive in its top-of-file gate so cold-start instances load it first."

  - name: b11_external_research_rule_present
    pattern: "B11"
    files: ["docs/BROWSER_DIRECTIVE.md"]
    must_match: true
    severity: critical
    rationale: |
      B11 binds @browser to the external-research mandate (WebSearch /
      WebFetch on factual claims about external state). Removing it lets
      stale-knowledge silent failures slip through. Composes with /un's
      Mandatory External Research rule.


