# ─────────────────────────────────────────────────────────────────────
# Layer-isolation: strategy + model code should consume data via the
# canonical loaders (ChimeraLoader, cadence_loader), NOT via direct
# pl.read_parquet on chimera or panel paths. Direct reads bypass the
# v51-vs-v50 selection logic, the cadence resolution, and the data_api
# contract -- silent breaks when pipeline schema evolves.
#
# Provenance: 2026-04-29 architecture audit. Today's session caught the
# te_panel asset-format bug (silent 100% NaN) precisely because strategies
# read panels by hand and don't validate schema. Today's fix tightens the
# producer side; this rule tightens the consumer side.
#
# Status: WARN-level until migration sweep is complete. Strategy modules
# under src/strategy/gen4_frontier_alpha/ have ~25 direct reads to migrate
# (one canary -- te_flow_tilt -- proves the pattern in this commit).
# ─────────────────────────────────────────────────────────────────────
layer_isolation:

  - name: strategy_no_direct_chimera_read
    pattern_must_not_contain: 'pl\.read_parquet.*chimera'
    files:
      - "src/strategy/gen4_frontier_alpha/*.py"
      - "src/strategy/gen3_engine_stack/*.py"
      - "src/strategy/gen5_growth/**/*.py"
    severity: critical
    rationale: "Strategy code should read chimera via ChimeraLoader / data_api, not direct pl.read_parquet."

  - name: strategy_no_direct_panel_read
    pattern_must_not_contain: 'pl\.read_parquet.*panels/daily'
    files:
      - "src/strategy/gen4_frontier_alpha/*.py"
      - "src/strategy/gen3_engine_stack/*.py"
    severity: critical

  - name: model_no_direct_chimera_read
    pattern_must_not_contain: 'pl\.read_parquet.*chimera'
    files:
      - "src/wm/v0/v0_baseline/*.py"
      - "src/wm/v1/v1_*_training/*.py"
      - "src/wm/v3/v3*_training/*.py"
      - "src/wm/v4/v4*_training/*.py"
      - "src/wm/v6/v6*_training/*.py"
      - "src/wm/v8/v8*_training/*.py"
      - "src/wm/v9/v9*_training/*.py"
      - "src/wm/v11/v11_training/*.py"
      - "src/wm/v12/v12_training/*.py"
      - "src/wm/v13/v13_training/*.py"
      - "src/wm/v14/v14_training/*.py"
    severity: critical
    rationale: "WM training scripts must load via data_api.load_full_data_for_training. Direct pl.read_parquet of chimera files bypasses cadence resolution + gate hooks."

  - name: model_no_direct_anti_fragile_load_full_data
    pattern_must_not_contain: 'from anti_fragile import.*load_full_data'
    files:
      - "src/wm/v1/v1_*_training/train_world_model.py"
      - "src/wm/v3/v3*_training/train_world_model.py"
      - "src/wm/v4/v4*_training/train_world_model.py"
      - "src/wm/v6/v6*_training/train_world_model.py"
      - "src/wm/v8/v8*_training/train_world_model.py"
      - "src/wm/v9/v9*_training/train_world_model.py"
      - "src/wm/v11/v11_training/train_world_model.py"
      - "src/wm/v12/v12_training/train_world_model.py"
      - "src/wm/v13/v13_training/train_world_model.py"
      - "src/wm/v14/v14_training/train_world_model.py"
      - "src/wm/v22/v22_training/train_world_model.py"
      - "src/wm/v23/v23_training/train_world_model.py"
      - "src/wm/v24/v24_training/train_world_model.py"
      - "src/wm/v25/v25_training/train_world_model.py"
    severity: critical
    rationale: |
      Phase D.10 (2026-04-29): WM trainers route load_full_data through
      data_api so future pipeline schema changes touch one module instead
      of 28. Any new version that imports load_full_data directly from
      anti_fragile bypasses the contract; replace with
      `from data_api import load_full_data_for_training as load_full_data`.


# ─────────────────────────────────────────────────────────────────────
# Required patterns (file MUST contain pattern). Phase B.6 uniform CLI.
# ─────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────
# No-tracked-binaries policy (informational; enforced by pre-commit hook)
# Provenance: 2026-04-30 discovery of 119 GB historical chimera parquet
# bloat in .git/objects/. The pre-commit hook
# (src/audit/check_no_large_files.py) blocks future additions of files
# > 5 MB or matching banned extensions. This block documents the policy
# but is NOT yet machine-checked by check_invariants.py (the hook handles
# enforcement at commit time).
# ─────────────────────────────────────────────────────────────────────
no_tracked_binaries_policy:
  banned_extensions:
    - ".parquet"
    - ".pt"
    - ".pth"
    - ".pkl"
    - ".pickle"
    - ".bin"
    - ".npy"
    - ".npz"
    - ".h5"
    - ".hdf5"
    - ".feather"
    - ".arrow"
    - ".mp4"
    - ".avi"
    - ".mov"
    - ".webm"
    - ".mkv"
    - ".wav"
    - ".mp3"
    - ".ogg"
  max_size_mb: 5
  enforcement: "src/audit/check_no_large_files.py (pre-commit hook)"
  bypass: "SKIP_LARGE_FILES_CHECK=1 git commit -m '...'"

required_patterns:

  - name: feature_registry_yaml_has_sources_key
    pattern: '^sources:'
    files: ["config/feature_registry.yaml"]
    severity: critical
    rationale: |
      Pipeline-spec schema-lock (added 2026-05-20 after c59c4e7 regression).
      src/pipeline/feature_registry.py::FeatureRegistry.load() reads
      `data["sources"]` and `data["chimera_v51"]`. If this key is absent the
      6 pipeline consumers (frontier_consolidator, validate_chimera,
      make_dataset, data_health_check, pipeline_e2e_test,
      transfer_entropy_panel) ALL fail with KeyError. Catches schema-drift
      pre-commit instead of mid-rebuild. Companion: pattern_must_not_contain
      `prefix_families:` (catalog-schema marker — those files belong in
      config/feature_catalog.yaml).

  - name: feature_registry_yaml_has_chimera_v51_key
    pattern: '^chimera_v51:'
    files: ["config/feature_registry.yaml"]
    severity: critical
    rationale: |
      Pipeline-spec schema-lock. FeatureRegistry.load() reads
      data["chimera_v51"] to construct ChimeraSpec(sources_to_join, ...).
      Without this key, frontier_consolidator fails with KeyError.

  - name: wm_trainer_features_flag
    pattern: '"--features"'
    files:
      - "src/wm/v1/v1_*_training/train_world_model.py"
      - "src/wm/v3/v3_training/train_world_model.py"
      - "src/wm/v3/v3_1_training/train_world_model.py"
      - "src/wm/v3/v3_2_training/train_world_model.py"
      - "src/wm/v3/v3_3_training/train_world_model.py"
      - "src/wm/v4/v4_training/train_world_model.py"
      - "src/wm/v4/v4_1_training/train_world_model.py"
      - "src/wm/v4/v4_2_training/train_world_model.py"
      - "src/wm/v4/v4_3_training/train_world_model.py"
      - "src/wm/v6/v6_training/train_world_model.py"
      - "src/wm/v6/v6_1_training/train_world_model.py"
      - "src/wm/v6/v6_2_training/train_world_model.py"
      - "src/wm/v6/v6_3_training/train_world_model.py"
      - "src/wm/v8/v8_training/train_world_model.py"
      - "src/wm/v8/v8_1_training/train_world_model.py"
      - "src/wm/v8/v8_2_training/train_world_model.py"
      - "src/wm/v8/v8_3_training/train_world_model.py"
      - "src/wm/v9/v9_training/train_world_model.py"
      - "src/wm/v11/v11_training/train_world_model.py"
      - "src/wm/v12/v12_training/train_world_model.py"
      - "src/wm/v13/v13_training/train_world_model.py"
      - "src/wm/v14/v14_training/train_world_model.py"
      - "src/wm/v22/v22_training/train_world_model.py"
      - "src/wm/v23/v23_training/train_world_model.py"
      - "src/wm/v24/v24_training/train_world_model.py"
      - "src/wm/v25/v25_training/train_world_model.py"
    severity: critical
    rationale: |
      Phase B.6 (2026-04-29): every WM base trainer must accept --features
      so run_all_training.py can pass `--features 13` uniformly. Adapter,
      snapshot, NCL variants are exempt (they inherit from the base
      checkpoint which already encodes the f-count).

  - name: wm_smoke_test_present
    pattern: 'def test_smoke_imports'
    files:
      - "tests/test_wm_smoke.py"
    severity: critical
    rationale: |
      Phase B.4 + WM_FINDINGS_COMPLEMENT (2026-04-29): cross-version
      invariant smoke test must exist. Asserts (per-version) that
      WM_BATCH_SIZE=32, NUM_BINS=255, ACTIVE_HORIZONS=[1,4,16,64],
      TWOHOT_FOCAL_GAMMA=0.0 are present in V1.0/V1.1/V1.4/V1.6
      settings.py. Catches Phase-A-style migration breakage at
      PR time, not after 4 GPU-hours. 5/5 PASS in <2s on CPU.

  - name: wm_smoke_invariant_assertions
    pattern: 'WM_BATCH_SIZE.*32|ACTIVE_HORIZONS.*1.*4.*16.*64|NUM_BINS.*255|TWOHOT_FOCAL_GAMMA.*0\.0'
    files:
      - "tests/test_wm_smoke.py"
    severity: warn
    rationale: |
      Smoke test must continue to assert the cross-version invariants.
      If anyone weakens the smoke (drops invariant checks), this rule
      surfaces it. Pattern is permissive (any one of the four phrases
      satisfies); the actual count is enforced by pytest itself.

  - name: per_asset_profile_schema_lock
    pattern: 'is_cousin_set_member|regime_tag'
    files:
      - "scripts/audit/build_per_asset_ma_ema_profile.py"
      - "scripts/audit/honest_v2_per_asset.py"
      - "scripts/audit/honest_v2_per_asset_oos.py"
      - "scripts/audit/honest_v2_per_asset_union.py"
      - "src/strategy/sleeves/per_asset_ma_ema_sleeve.py"
    severity: critical
    rationale: |
      Per-asset MA/EMA architecture schema-lock (added 2026-05-20).

      The per-asset profile parquet (data/processed/per_asset_ma_ema_profile.parquet)
      MUST contain both `is_cousin_set_member` (bool, marks deploy-grade cells from
      within-asset complementarity selection) and `regime_tag` (string, marks
      regime-survival classification: ALL_WEATHER / BLOCK_OWN_CRASH / BLOCK_OWN_BEAR /
      BULL_AND_CHOP / BULL_ONLY / REGIME_DEPENDENT / INSUFFICIENT_DATA).

      The simulators that consume the profile MUST reference both fields. This rule
      ensures the schema doesn't drift away from cousin-set selection + regime-tag
      gating.

      Empirical anchor (commit 2026-05-20): OOS validation on canonical window
      2024-05-16 -> 2025-03-15 delivered +159.33% NAV / +215% annualized /
      Sortino +4.18 / Max DD -19% with the patched architecture, 2.4x the
      current shipped confluence-only sleeve baseline (+67.21%) on the same
      OOS window. The schema integrity ensures this lift survives future edits.

      Memory: [[claude-instance-state-2026-05-20-...]]
      Profile: data/processed/per_asset_ma_ema_profile.parquet

  - name: per_asset_ma_ema_sleeve_constraints
    # Ensures the per-asset MA/EMA UNION sleeve enforces user-mandated
    # small-account safety constraints (2026-05-20): K_MAX=8, per-asset cap=10%,
    # total deploy cap=60% (40% cash buffer always), AND confirmation gate
    # requires ≥2 qualifying cells per asset (added 2026-05-20 evening).
    pattern: 'TOTAL_DEPLOY_CAP = 0\.60|TOTAL_DEPLOY_CAP=0\.60'
    files:
      - "src/strategy/sleeves/per_asset_ma_ema_sleeve.py"
    severity: critical

  - name: per_asset_ma_ema_confirmation_gate
    # Confirmation gate empirically delivers +18.46pp NAV / +0.61 Sortino /
    # -5pp DD on canonical OOS (FIX_VARIANTS_REPORT.md). Removing the gate
    # reverts to the no-gate baseline (+72.94% instead of +91.40%).
    pattern: 'CONFIRMATION_GATE_MIN'
    files:
      - "src/strategy/sleeves/per_asset_ma_ema_sleeve.py"
    severity: critical
    rationale: |
      User-mandated 2026-05-20: "60% max portfolio allocation, and 10% max
      allocation per asset". The 60% cap reserves a 40% cash buffer at all
      times for small-account safety. Removing or relaxing this constant
      breaks the safety contract.

      The sleeve also enforces PER_ASSET_CAP = 0.10 and K_MAX = 8; combined,
      these constraints produced the OOS profile of +44.50% / Sortino +2.10 /
      DD -17.94% / mean deploy 55.3%.

      Memory: [[user-mandate-60-10-K8-cash-buffer-2026-05-20]]

  - name: audit_script_upper_bound_sentinel
    pattern: 'UPPER_BOUND_NOT_DEPLOY_ESTIMATE'
    files:
      - "scripts/audit/test_smart_ma_discovery.py"
      - "scripts/audit/test_exit_v2_atr_and_setup_toxicity.py"
      - "scripts/audit/rsi_exhaust_with_multi_exit.py"
    severity: critical
    rationale: |
      Sister rule to leakage::live_sleeve_no_forward_return_in_selection.

      2026-05-20 oracle audit (docs/ORACLE_CORRECTIONS_2026_05_20.md) found
      these three scripts emit a `nav_4pct` headline that is the arithmetic
      sum of per-event PnLs x 4% notional sizing across THOUSANDS of events
      over 11 months. Implied entry rate per day exceeds available NAV. The
      number is a best-K-equivalent upper bound under the same disease class
      as the 5 simulators deprecated in f60365d -- expressed via
      capacity-free aggregation rather than forward-return-as-K-selector.

      The JSON output field is now `nav_4pct_upper_bound_arithmetic` and a
      UPPER_BOUND_NOT_DEPLOY_ESTIMATE block has been added to each file's
      docstring. This rule guarantees that block remains.

      For HONEST portfolio NAV: feed the per-event ledger through
      honest_v2_simulator.simulate_honest with proper K_MAX / BET_FRACTION /
      capital lockup, or use v3 paper_trade_replay (canonical truth).

      RELATIVE comparisons within a script (setup-toxicity vs 7d-hold;
      Fibonacci vs brute-force) remain VALID because both arms share the
      same notional aggregator. The disease is in cross-script ABSOLUTE
      magnitude claims.

      Memory: [[red-team-failure-diagnostic-2026-05-20]],
              [[feedback-honesty-no-inflation]]


# ─────────────────────────────────────────────────────────────────────
# Multi-asset pipeline scripts must accept --force
# Provenance: 2026-04-29 user request — `--force` must be a uniform
# rebuild contract: every pipeline script either (a) deletes prior
# dated snapshots before rebuild (chimera/panels/frontier/bars), or
# (b) is aliased to its existing rebuild flag (fetch -> --recheck-missing).
# Without uniform support, run_pipeline.py --force passes the flag to
# children that silently ignore it -> stale snapshots survive a forced
# rebuild and silently re-poison strategy backtests.
# ─────────────────────────────────────────────────────────────────────
cli_force_support:
  required_flags: ["--force"]
  files:
    - "src/pipeline/fetch_all.py"
    - "src/pipeline/build_bars.py"
    - "src/pipeline/build_panels.py"
    - "src/pipeline/frontier_consolidator.py"
    - "src/pipeline/make_dataset.py"
    - "src/pipeline/make_dataset_legacy.py"
    - "src/pipeline/add_xrel_features.py"
    - "src/pipeline/features/hawkes_branching_ratio.py"
    - "src/pipeline/features/realized_volatility.py"
    - "src/pipeline/features/transfer_entropy_panel.py"
    - "src/pipeline/features/basis_signals.py"
    - "src/pipeline/features/multi_venue_features.py"
    - "src/pipeline/features/lob_proxy_panel.py"
    - "src/pipeline/features/lob_proxy_daily.py"
    - "src/pipeline/features/liq_features.py"
    - "src/pipeline/ingest/whale_activity.py"
    - "src/pipeline/ingest/liquidations_approx.py"
    - "src/pipeline/bars/dib_bars_fast.py"
    - "src/pipeline/bars/range_bars_fast.py"
    - "src/pipeline/bars/runs_bars.py"
    - "src/pipeline/bars/adaptive_vol_bars.py"
    - "scripts/audit/build_asset_own_regime_panel.py"
  exclude_files:
    # Universe-agnostic / read-only
    - "src/pipeline/pre_train_gate.py"
    - "src/pipeline/gc_snapshots.py"
    - "src/pipeline/coverage_report.py"
  severity: warn


# ─────────────────────────────────────────────────────────────────────
# Producer contract: every pipeline producer must accept --assets (plural)
# for asset-batch input. Provenance: 2026-05-21 retrofit closing the gap
# surfaced by stale-asset refresh runbook. Singular --asset / --symbol
# is allowed as a deprecated alias but --assets MUST exist for batch ops.
# ─────────────────────────────────────────────────────────────────────
cli_assets_support:
  required_flags: ["--assets"]
  files:
    - "src/pipeline/fetch_all.py"
    - "src/pipeline/frontier_consolidator.py"
    - "src/pipeline/make_dataset.py"
    - "src/pipeline/make_dataset_legacy.py"
    - "src/pipeline/add_xrel_features.py"
    - "src/pipeline/features/hawkes_branching_ratio.py"
    - "src/pipeline/features/realized_volatility.py"
    - "src/pipeline/features/transfer_entropy_panel.py"
    - "src/pipeline/features/basis_signals.py"
    - "src/pipeline/features/multi_venue_features.py"
    - "src/pipeline/features/lob_proxy_panel.py"
    - "src/pipeline/features/lob_proxy_daily.py"
    - "src/pipeline/features/liq_features.py"
    - "src/pipeline/ingest/whale_activity.py"
    - "src/pipeline/ingest/liquidations_approx.py"
    - "src/pipeline/bars/dib_bars_fast.py"
    - "src/pipeline/bars/range_bars_fast.py"
    - "src/pipeline/bars/runs_bars.py"
    - "src/pipeline/bars/adaptive_vol_bars.py"
    - "scripts/audit/build_asset_own_regime_panel.py"
  exclude_files:
    - "src/pipeline/pre_train_gate.py"
    - "src/pipeline/gc_snapshots.py"
    - "src/pipeline/coverage_report.py"
