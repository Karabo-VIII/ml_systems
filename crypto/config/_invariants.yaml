# ─────────────────────────────────────────────────────────────────────
# Cost model invariants
# ─────────────────────────────────────────────────────────────────────
cost_model:

  - name: p_fill_default_is_optimistic
    pattern: "p_fill.*=.*0\\.80|p_fill_default.*0\\.80"
    files: ["src/strategy/cost_model.py", "src/analysis/execution_sim.py"]
    must_be_documented_as: "OPTIMISTIC; real measured 0.20-0.40 per maker_cost_calibration.yaml"
    severity: warn
    rationale: "OHLC replay calibration 2026-04-22 found real p_fill 20-40%."

  - name: spot_round_trip_cost
    expected_value: "0.0024"  # 0.24% RT taker
    pattern: "SPOT_COST.*0\\.0024|round_trip.*0\\.0024"
    files: ["src/strategy/cost_model.py"]
    severity: warn


# ─────────────────────────────────────────────────────────────────────
# Simulator invariants (post-MtM-bug-fix 2026-04-22)
# ─────────────────────────────────────────────────────────────────────
simulator:

  - name: mtm_only_no_double_count
    # Single-line match (checker iterates lines; comments stripped).
    # Forbidden code patterns:
    #   pnl_bar += ret_from_entry           (original bug)
    #   pnl_bar += w * ret_from_entry        (with weight)
    #   pnl_bar = pnl_bar + ret_from_entry   (alt form)
    pattern_must_not_contain: "pnl_bar\\s*\\+=.*ret_from_entry|pnl_bar\\s*=\\s*pnl_bar\\s*\\+.*ret_from_entry"
    # 2026-06-05 re-point: the original 3 src/analysis simulators were ARCHIVED in the 2026-06-04 reset, leaving
    # this CRITICAL guard pointing at deleted files (silent no-op). Re-pointed to the LIVE simulation dirs so the
    # antipattern is caught ANYWHERE it might be reintroduced (verified: no live file currently contains it).
    # The live harness uses different accounting (no pnl_bar); its MtM correctness is additionally covered by the
    # apparatus gate (src/audit/check_strat_apparatus.py, Layer 9) + the reconciliation probe below.
    files: ["src/wealth_bot/**/*.py", "src/strat/**/*.py"]
    severity: critical
    rationale: |
      MtM double-count fix 2026-04-22. Adding ret_from_entry to pnl_bar
      double-counts MtM since intermediate bars already paid in. Equity
      inflation 5-7x. NEVER reintroduce -- now scanned across the live sim dirs.

  - name: reconciliation_probe_present
    files: ["scripts/probe_simulator_fix.py"]
    must_exist: true
    severity: warn
    rationale: "Every new simulator must include reconciliation probe."

  - name: chimera_v51_spawn_no_recursion
    # The child must invoke with --workers 1 (sequential path). Any other
    # value re-enters the parallel branch and recursively spawns -> Windows
    # segfault (exit=0xC0000005) and exit=0 noops, producing zero output.
    pattern_must_not_contain: '"--workers"\s*,\s*"(?!1")[2-9][0-9]*"'
    files: ["src/pipeline/make_dataset.py"]
    severity: critical
    rationale: |
      2026-04-28 bug: child spawn hardcoded "--workers 12" caused infinite
      recursion. Symptom: stale manifests mis-tagged "OK", actual chimera
      build output: 0 new files. Fixed; this invariant prevents reintroduction.


# ─────────────────────────────────────────────────────────────────────
# Leakage invariants
# ─────────────────────────────────────────────────────────────────────
leakage:

  - name: feature_registry_no_catalog_schema_collision
    pattern_must_not_contain: '^prefix_families:|^meta:\s*$'
    files: ["config/feature_registry.yaml"]
    severity: critical
    rationale: |
      Schema-collision guard (added 2026-05-20).
      `prefix_families:` and top-level `meta:` are markers of the metadata
      catalog schema (config/feature_catalog.yaml). If they appear in the
      pipeline-spec YAML, c59c4e7 has happened again: an auto-builder has
      overwritten the registry. Recovery: restore from git, ensure
      scripts/audit/build_feature_registry.py writes to feature_catalog.yaml.

  - name: live_sleeve_no_forward_return_in_selection
    # Selection-time look-ahead detector for LIVE-DEPLOY code only.
    # The 2026-05-20 audit found 5 analysis scripts with this bug;
    # those are marked DEPRECATED in their docstrings (sentinels).
    # This rule polices LIVE sleeves (src/strategy/sleeves/*) where
    # look-ahead would propagate to actual deployment.
    pattern_must_not_contain: '\.sort_values\("ret_E_14d"|\.sort_values\("ret_fwd_|\.nlargest\(\s*\d+\s*,\s*"ret_E_14d"|\.nlargest\(\s*\d+\s*,\s*"ret_fwd_|=\s*np\.where\([^)]*ret_E_14d|=\s*today_fires\["ret_E_14d"\]|\["asym_ret"\]\s*=.*ret_E_14d'
    files:
      - "src/strategy/sleeves/smart_discovery_17_sleeve.py"
    severity: critical
    rationale: |
      Selection-time look-ahead bug (root cause of 2026-05-20 V2 inflation:
      claimed +468% OOS was actually +33% honest). When K-selection sorts
      today's fires by ret_E_14d (the 14-day forward return), the
      simulator is using perfect foresight to pick winners. This is
      mathematically wrong for any deploy claim.

      Catches BOTH direct-sort AND derived-column patterns.

      SCOPE: applies to LIVE sleeves in src/strategy/sleeves/ that drive
      actual deployment. Analysis scripts in scripts/audit/ are
      EXEMPTED -- they intentionally use forward returns for best-K
      upper-bound computation (with explicit DEPRECATED/SENTINEL
      notes). Audit scripts with this pattern (full list):
        scripts/audit/improve_metrics_v2.py        (DEPRECATED sentinel)
        scripts/audit/proper_portfolio_simulator.py (DEPRECATED sentinel)
        scripts/audit/dynamic_rolling_evolution.py  (DEPRECATED sentinel)
        scripts/audit/run_n1_n3_setup_validation.py (DEPRECATED sentinel)
        scripts/audit/subset_engines_analysis.py    (DEPRECATED sentinel)
        scripts/audit/oos_replay_14_setups.py       (uses ret_E_14d in
          asym_ret pattern; documented as best-K-upper-bound)
        scripts/audit/honest_v2_simulator.py        (intentionally has
          best-K mode AS WELL AS signal-K honest mode; report both)

      Legal selection signals for LIVE deploy: indicator strength,
      signal-magnitude, cross-asset rank computed AT entry, ML-ranker
      output trained on past-only features.

      Memory: [[red-team-failure-diagnostic-2026-05-20]],
              [[feedback-honesty-no-inflation]]

  # Disabled (too noisy via regex; real detection requires AST analysis).
  # The G-AUDIT-011 BOCPD bug was caught manually; permanent fix is to
  # use sklearn TimeSeriesSplit or rolling.std() instead of full-series .std().
  # Any future BOCPD-class diff MUST be reviewed by an expert agent.
  # - name: no_full_history_standardization
  #   pattern_must_not_contain: "..."
  #   files: ["src/frontier/features/*.py", "src/pipeline/*.py"]
  #   severity: warn
  #   rationale: "G-AUDIT-011: BOCPD used full-history std() = look-ahead leakage."

  - name: no_inline_gitignore_comments
    # Match: a non-comment line that has [SP|TAB] + # later on the SAME line.
    # Use horizontal-whitespace only ([ \t]+) — \s also matches \n which would
    # span across lines and false-positive on consecutive comment paragraphs.
    pattern_must_not_contain: "^[A-Za-z0-9_*/.\\\\-][A-Za-z0-9_*/.\\\\-]*[ \\t]+#"
    files: [".gitignore"]
    severity: critical
    rationale: |
      G-PIPE-005: inline comments after pattern broke `data/processed/` rule.
      Git doesn't support inline comments in .gitignore.


# ─────────────────────────────────────────────────────────────────────
# DAG / pipeline ordering invariants
# ─────────────────────────────────────────────────────────────────────
dag:

  - name: chimera_legacy_runs_after_fetch_only
    rule: "chimera_legacy.depends_on == ['fetch_binance']"
    file: "src/pipeline/run_pipeline.py"
    severity: critical
    rationale: |
      chimera_legacy must NOT depend on hawkes/panels/frontier — adding
      such a dep would re-introduce the model-training-blocked-by-hawkes
      delay (fixed 2026-04-28).

  - name: chimera_v51_depends_on_v50_and_frontier
    rule: "chimera_v51.depends_on contains chimera_legacy AND frontier_consolidate"
    file: "src/pipeline/run_pipeline.py"
    severity: critical

  - name: parse_tiers_chimera_legacy_position
    rule: "parse_tiers('all') has chimera_legacy at index 1 (right after fetch_binance)"
    file: "src/pipeline/run_pipeline.py"
    severity: warn



# ─────────────────────────────────────────────────────────────────────
# Universe yamls: liquidity_tier coverage
# Every asset spec in u50/u100 must carry a measured liquidity_tier.
# (u10 is also patched but is small enough that drift is obvious.)
# ─────────────────────────────────────────────────────────────────────
# ─────────────────────────────────────────────────────────────────────
# run_pipeline.py orchestrator: every multi-asset child stage must
# thread --universe through. Catches the regression class where the
# child script accepts --universe but the parent forgets to pass it.
# ─────────────────────────────────────────────────────────────────────
run_pipeline_cmds:

  # Each pattern uses inline (?s) so '.' matches newlines — cmd lists are
  # multi-line in run_pipeline.py. Bounded to .{0,400} to scope to the
  # script's own cmd block (not stray --universe mentions elsewhere).
  - name: fetch_threads_universe
    pattern: '(?s)fetch_all\.py.{0,400}--universe'
    files: ["src/pipeline/run_pipeline.py"]
    must_match: true
    severity: critical
    rationale: |
      Provenance: 2026-04-29 dry-run audit caught fetch_binance dropping
      --universe at the orchestrator layer. fetch_all.py accepts --universe
      but run_pipeline didn't thread it -> "--universe u50 --tiers all"
      would download EVERY discovered asset under data/raw/, not just
      u50's 48. Same B5 / G-PIPE bug class as chimera_legacy + frontier
      (commit 8f14433).

  - name: chimera_legacy_threads_universe
    pattern: '(?s)make_dataset_legacy\.py.{0,400}--universe'
    files: ["src/pipeline/run_pipeline.py"]
    must_match: true
    severity: critical
    rationale: |
      Provenance: 2026-04-29 user ran end-to-end pipeline at u50;
      chimera_legacy iterated 104 raw-discovered assets instead of 48
      u50 assets because the cmd list omitted --universe. Burned ~70min
      compute on out-of-scope assets. Same B5 pattern as build_panels
      (fixed earlier in commit 03656e9).

  - name: build_panels_threads_universe
    pattern: '(?s)build_panels\.py.{0,400}--universe'
    files: ["src/pipeline/run_pipeline.py"]
    must_match: true
    severity: critical

  - name: hawkes_threads_universe
    pattern: '(?s)hawkes_branching_ratio\.py.{0,400}--universe'
    files: ["src/pipeline/run_pipeline.py"]
    must_match: true
    severity: critical

  - name: frontier_threads_universe
    pattern: '(?s)frontier_consolidator\.py.{0,400}--universe'
    files: ["src/pipeline/run_pipeline.py"]
    must_match: true
    severity: critical

  - name: chimera_v51_threads_universe
    pattern: '(?s)make_dataset\.py.{0,400}--universe'
    files: ["src/pipeline/run_pipeline.py"]
    must_match: true
    severity: critical

  # --force threading: orchestrator must propagate --force to every child
  # cmd so that `run_pipeline.py --force` truly forces a fresh rebuild
  # across all stages (delete prior dated snapshots before rebuild).
  # Provenance: 2026-04-29 user request — without uniform --force, a stale
  # u10 snapshot can survive a u50 rebuild and silently re-poison strategy
  # backtests. Each child script defines --force semantics (delete-prior
  # for chimera/panels/frontier/bars, alias for fetch).
  - name: fetch_threads_force
    pattern: '(?s)fetch_all\.py.{0,500}--force'
    files: ["src/pipeline/run_pipeline.py"]
    must_match: true
    severity: critical

  - name: bar_fabric_threads_force
    pattern: '(?s)build_bars\.py.{0,500}--force'
    files: ["src/pipeline/run_pipeline.py"]
    must_match: true
    severity: critical

  - name: build_panels_threads_force
    pattern: '(?s)build_panels\.py.{0,500}--force'
    files: ["src/pipeline/run_pipeline.py"]
    must_match: true
    severity: critical

  - name: hawkes_threads_force
    pattern: '(?s)hawkes_branching_ratio\.py.{0,500}--force'
    files: ["src/pipeline/run_pipeline.py"]
    must_match: true
    severity: critical

  - name: frontier_threads_force
    pattern: '(?s)frontier_consolidator\.py.{0,500}--force'
    files: ["src/pipeline/run_pipeline.py"]
    must_match: true
    severity: critical

  - name: chimera_legacy_threads_force
    pattern: '(?s)make_dataset_legacy\.py.{0,500}--force'
    files: ["src/pipeline/run_pipeline.py"]
    must_match: true
    severity: critical

  - name: chimera_v51_threads_force
    pattern: '(?s)make_dataset\.py.{0,500}--force'
    files: ["src/pipeline/run_pipeline.py"]
    must_match: true
    severity: critical

  # Panel-builder skip-existing globs MUST point at the CANONICAL panel
  # output, not auxiliary per-asset files. Provenance: 2026-04-29 top_trader
  # crashed FileNotFoundError on s3_metrics_panel.parquet because the s3
  # skip-existing glob `s3_*.parquet` matched per-asset
  # `s3_metrics_daily_<SYM>.parquet` files and the s3 stage was silently
  # skipped, leaving the consolidated panel unbuilt.
  - name: build_panels_glob_canonical_s3
    pattern: 's3_metrics_panel\.parquet'
    files: ["src/pipeline/build_panels.py"]
    must_match: true
    severity: critical

  - name: build_panels_glob_canonical_whale
    pattern: 'whale_activity_daily\.parquet'
    files: ["src/pipeline/build_panels.py"]
    must_match: true
    severity: critical

  - name: build_panels_glob_canonical_liq
    pattern: 'liq_daily_approx\.parquet'
    files: ["src/pipeline/build_panels.py"]
    must_match: true
    severity: critical

  - name: build_panels_glob_canonical_top_trader
    pattern: 's3_features_long\.parquet'
    files: ["src/pipeline/build_panels.py"]
    must_match: true
    severity: critical


