# Path to 2X+ from this baseline
path_to_2x_2026:
  current_baseline_pct_yr: 35-50  # revised blend (14-asset seed)
  next_lifts:
    - lift_pct_yr: 0
      action: "Wire bounce_ml/fade_ml/swing_ml setup classifiers into xsec K=7+7"
      effort_days: 1
      blocker: "FALSIFIED 2026-05-03 (logs/strat_audit/setup_classifier_gate_xsec.md)"
      finding: |
        Best gate Sharpe = 4.26 (V0 baseline = no gate). bounce/swing
        classifiers DROP Sharpe by 0.55-1.46. Setup classifiers were
        trained on different problem (single-asset binary entries) and
        target setups orthogonal to xsec ranker's forward-3d momentum
        picks. Fade-dual-side IS a wealth-axis lever (+110pp CAGR) but
        loses Sharpe and worsens DD. Sizers are no-ops because confidence
        is uniform across xsec top-K.
    - lift_pct_yr: 100-200
      action: "Run xsec K=7+7 FULL d-neut on 87-asset universe (NEW BASELINE)"
      effort_days: 0  # already validated
      status_2026_05_03: "WF-VALIDATED (3/4 windows, agg Sh 4.26, worst DD -8.68%)"
      finding: |
        WF-validated: 4-window walk-forward audit 2025-Q1/Q2/Q3 + 2026-Q1.
        Sharpe per window: 0.81 / 5.39 / 4.67 / 5.37. Aggregate Sh 4.26 /
        CAGR 256.6% / DD -8.68% / Calmar 29.56. W1-2025-Q1 weak (Sh 0.81)
        but cleared min gate. Source of edge is cross-sectional dispersion
        across 87 assets vs the 14-asset seed in revised_blend_2026.
        Live derate ~50-75% of fixed-backtest expected = ~125-190%/yr live.
      seed_path: logs/paper_trader_v2/seeds/pt_xsec_K7_7_FULL_dneut_u87_V0_baseline_no_gate/
      report_path: logs/strat_audit/xsec_u87_wf_audit.md
    - lift_pct_yr: 100-200
      action: "V3 fade_dual_side variant (87-asset) — most regime-robust"
      effort_days: 0  # already validated
      status_2026_05_03: "WF-VALIDATED (4/4 windows, agg Sh 4.11, worst DD -11.80%)"
      finding: |
        ONLY variant with 4/4 walk-forward Sharpe > 1.5 (3.90 / 3.94 /
        4.44 / 4.17). Aggregate Sh 4.11 / CAGR 366.9% / DD -14.92% /
        Calmar 24.60. Fade gate aligned with W1-2025-Q1 BTC consolidation
        regime — only variant to clear that window cleanly. Best wealth
        + stability sleeve.
      seed_path: logs/paper_trader_v2/seeds/pt_xsec_K7_7_FULL_dneut_u87_V3_fade_dual_side/
      report_path: logs/strat_audit/xsec_u87_wf_audit.md
    - lift_pct_yr: 50-100
      action: "K=15+15 d-neut (87-asset) — top Sharpe sleeve"
      effort_days: 0
      status_2026_05_03: "WF-VALIDATED (3/4 windows, agg Sh 4.75, worst DD -7.53%)"
      finding: |
        Top WF-validated Sharpe across all variants. Sh 4.75 / CAGR 166.9%
        / DD -9.01% / Calmar 18.52. Most diversified positions per day
        (15 longs + 15 shorts) so lower per-position concentration risk.
        Trades 100pp CAGR for +0.5 Sharpe + 1pp lower DD.
    - lift_pct_yr: 50-100
      action: "K=5+5 d-neut (87-asset) — top Calmar sleeve"
      effort_days: 0
      status_2026_05_03: "WF-VALIDATED (3/4 windows, agg Sh 3.54, worst DD -10.06%)"
      finding: |
        Top Calmar across all variants (31.70). Sh 3.54 / CAGR 318.8% /
        DD -10.06%. Most concentrated positions = highest CAGR within DD
        bound. Best wealth-per-DD sleeve.
    - lift_pct_yr: 20-40
      action: "Add Universa OTM put hedge sleeve (5% allocation)"
      effort_days: 2
      blocker: "Deribit options ingest"
    - lift_pct_yr: 10-20
      action: "Magnitude-decile sizing on xsec ranker output"
      effort_days: 1
      blocker: "G-FRONTIER-008 scoped, not built"
    - lift_pct_yr: 15-30
      action: "Conformal gating + quantile regression heads on V1.1 trunk"
      effort_days: 2
      blocker: "G-ML-001 / G-ML-002 scoped"
  combined_target_pct_yr: 250-400  # was 100-150 prior to 87-asset rediscovery
  total_pa_multiple_when_complete: 2.5-4X
  notes_2026_05_03: |
    [updated post-WF-audit]
    Setup classifier gating hypothesis FALSIFIED. The dominant lever for
    pushing beyond 2X is universe expansion (10/14 -> 87 -> 100) on
    the SAME ranker, not new ML layers on top. Live derate after
    p_fill calibration is the binding constraint.

    All 5 d-neut variants (K=5+5/7+7/10+10/15+15 + V3 fade) cleared the
    walk-forward gate (3+ of 4 windows Sharpe > 1.5, agg Sh > 2.0,
    worst-window DD within limit). Long-only variants (K_short=0) ALL
    failed DD (-50%+).

