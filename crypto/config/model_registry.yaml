# Model Registry — declarative spec of every trained model.
#
# Schema:
#   models: dict of model-id -> spec
#     family: 'world_model' | 'ranker' | 'meta_labeler' | 'rl_agent' | 'classifier'
#     family_subtype: model-specific category (e.g., 'transformer_rssm', 'wavenet_moe')
#     checkpoint_glob: relative path glob for the checkpoint(s)
#     features: list of feature columns OR universe ref ('f34' = first 34 chimera cols)
#     train_data: 'v50_chimera' | 'v51_chimera' | ranker-specific
#     universe: 'u10' | 'u50' | 'u100'
#     status: 'production' | 'frozen' | 'deprecated' | 'experimental' | 'stub'
#     trained_at: ISO date or 'unknown'
#     v51_compatible: bool — can this model be evaluated on v51 chimera as-is?
#     retrain_needed: bool — should we retrain on v51 154-feature panel?
#     notes: str
#
#   training_data_spec: declares the canonical TrainingLoader inputs.

