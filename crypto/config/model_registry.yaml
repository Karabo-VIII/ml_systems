  available_cadences: [dollar, 1d, 4h, 1h, 15m]
  default_horizon_targets: [target_return_1, target_return_4, target_return_16, target_return_64]
  default_split: {train_end: "2023-07-01", val_end: "2024-05-15", oos_end: "2025-03-15", unseen_start: "2025-03-15"}
