# Canonical strategy-dimension registry (machine-readable mirror of
# docs/CANONICAL_STRATEGY_DIMENSION_REGISTRY_2026_06_11.md).
# Catalogs the 7 NON-signal decomposition axes (signal axis = config/ti_master_catalog.yaml + feature_registry.yaml).
# have: 1=built-on-disk 0=not-built P=partial   la: S=causal-safe R=repaint/risky U=unsafe
# Built 2026-06-11. The signal axis is deliberately excluded here (it has its own two catalogs).
meta:
  built: 2026-06-11
  axes: 7   # 1,2,3,5,6,7,8 of the 8-axis lattice; axis-4 (signal) -> ti_master_catalog.yaml + feature_registry.yaml
  doc: docs/CANONICAL_STRATEGY_DIMENSION_REGISTRY_2026_06_11.md
  lattice_source: docs/MARKET_FRAMEWORK/README.md
  note: "every axis below is a conditioning/execution layer, NOT an alpha source; lists are extensible"

