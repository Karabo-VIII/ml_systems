axis8b_exit_mechanism:   # the primary ask -- dedicated exit catalog
  # family: MECHANICAL = price/time-driven, no signal (the "mechanical exit")  |
  #         STRAT      = signal/indicator/regime-driven (the "strat-based exit") |  HYBRID = both
  # This split IS the user's flagged gap ("strat-based exit vs mechanical exits"); coverage_report
  # in discovery_contract.py reads family from HERE so a run can't silently test only one side.
  - {name: fixed_horizon_time_stop, family: mechanical, params: "hold H bars", coded: 1, src: "oracle_exit_knob/exit_capture_proxy",
     read: "best-hold ~11-12 bars; LEAVE FIXED; H not factor-predictable R2 0.01-0.13; the no-skill control"}
  - {name: trailing_chandelier, family: mechanical, params: "ATR mult x rolling-period-high", coded: 1, src: family1_chandelier_trail,
     dead: D23, read: "adds ~2pp/trade; fails PEPE-MA UNSEEN but works on breadth-bounce (entry-dependent)"}
  - {name: trailing_pct_off_high, family: mechanical, params: "trail fraction", coded: 1, src: naive_ma_trailing, read: "the 10pct-risk naive variant"}
  - {name: ma_cross_exit_signal_flip, family: strat, params: "exit MA len", coded: 1, src: "exit_capture_proxy/family_regime_map",
     read: "1h whipsaw PF 0.91; 4h PF 1.23 = beta"}
  - {name: fixed_target_take_profit, family: mechanical, params: "R-mult or pct", coded: 0, read: "UNTESTED -- softest open exit sub-axis (D61)"}
  - {name: triple_barrier, family: mechanical, params: "up/down/time", coded: 1, dead: D09, read: "AUC 0.472 as LABEL; as EXIT policy untested"}
  - {name: managed_rsi_exit, family: strat, params: "exit RSI thresh", coded: P, read: "entry-coupled"}
  - {name: regime_conditioned_exit, family: strat, params: "regime x hold", coded: 0, read: "UNTESTED -- D61 SOFTEST open"}
  - {name: sub_bar_exit, family: hybrid, params: "finer exit clock", coded: 0, read: "UNTESTED -- D61 SOFTEST open"}

exit_verdict:
  dead: D61
  finding: "smart exit-timing UNDERPERFORMS dumb fixed hold on daily breakouts (fair Delta -0.037, wins 3/12)"
  artifact_caught: "the 'beats-null' was a HOLD-LENGTH artifact, caught by the no-skill fixed-hold control"
  open_subaxes: [take_profit, regime_conditioned, sub_bar]
  tool: "python src/strat/exit_capture_proxy.py  (selftest = two-sided soundness)"

cross_cutting_lenses: [actor_inst_retail_defi_mm, sector_l1_meme_defi_ai, hold_cadence, capital_velocity]

# Config-canonicalization axis -- NOT a slice of the lattice but a SEARCH-SPACE DISCIPLINE that
# every config-discovery run must apply (else near-dup configs inflate multiple-comparisons and you
# overfit to a noise-level param difference). The phenomenon: MA(28,29) ~= MA(27,30) ~= MA(28,30)
# (archive 9,900-pair sweep, top-10 all clustered fast=25-31/slow=29-33). Was handled ad-hoc by
# hand-curated sparse grids (ratio >=2x); NOW formalized in src/framework/discovery_contract.py
# (canonicalize_grid: keep reps that are mutually >= rel_tol apart; report effective_N).
config_canonicalization:
  phenomenon: "near-identical configs (MA(28,29)~MA(27,30)) waste search budget + inflate multiple-comparisons"
  evidence: "archive/restart_2026_06_04/docs/archive_pre_2026_05/MA_EMA_PERMUTATION_FINDINGS_2026_05_12.md (9900 pairs)"
  rule: "two configs are near-dup iff every param within rel_tol (default 0.15); keep mutually-separated reps"
  formalized_in: "src/framework/discovery_contract.py::canonicalize_grid"
  granularity_ladder:  # which grouping granularity earns its degrees of freedom (all walk-forward, holdout-sealed)
    per_asset: "DEAD -- config choice is noise (regime_dna_lab)"
    per_cluster_asset_dna: "NOT robust -- u10 +5pp did not replicate at u50 (MA_GRANULARITY_DISCOVERY)"
    per_regime: "HURTS -- adds losing DOWN-regime configs; regime-GATE instead (-25pp t-2.7 u50 3MA)"
    per_cadence: "REAL + STABLE -- the one axis whose per-group optimum repeats across folds (PER_CADENCE_CONFIG)"
    pooled_per_cadence: "THE honest architecture -- one config per timeframe, pooled across assets"
