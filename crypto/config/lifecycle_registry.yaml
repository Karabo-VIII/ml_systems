# Strategy Lifecycle Registry — G1 governance objective
# Per docs/STRATEGIC_OBJECTIVES.md §7
#
# Each pillar has a lifecycle state. Transitions are gated. Reading + writing
# is mediated by src/audit/lifecycle_state.py.
#
# States:
#   BIRTH           — scaffold exists; py_compile OK; smoke PASS
#   PAPER           — at least one v3 paper-trade-replay window completed
#   LIVE_PROBATION  — multi-window v3 positive; not yet on live capital
#   LIVE_PROMOTED   — on live capital; rolling 30-day drift within tolerance
#   DECAY_WATCH     — drift detected (G2); reduced allocation; pending review
#   SUNSET          — 60-day window failed gates; allocation = 0; pending archive
#   ARCHIVED        — moved to backups/BKP_<date>_SUNSET/
#
# Transition rules (codified in src/audit/lifecycle_state.py):
#   BIRTH -> PAPER:           1 v3 window any result; py_compile + smoke + CDAP CLEAN
#   PAPER -> LIVE_PROBATION:  Sh >= 0.5 AND DD >= -10% on ≥1 v3 window
#   LIVE_PROBATION -> LIVE_PROMOTED: 3+ non-overlapping v3 windows positive; PBO < 0.30; DSR p < 0.10
#   LIVE_PROMOTED -> DECAY_WATCH: rolling 30d live Sharpe drops > 50% from validated OR IC drops > 30%
#   DECAY_WATCH -> SUNSET:    60-day window fails Sh > 0.3 OR breaches DD -15%
#   SUNSET -> ARCHIVED:       90 days no recovery; manual review
#
# Status as of 2026-05-15 (initial seed; review + update each session end):

